<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>3D Tour</title>
        <style>
            :root {
                --c-pri: #7cb342;
                --c-pri-dk: #5a8a2a;
                --c-pri-lt: #aed581;
                --c-pri-a: rgba(124, 179, 66, 0.15);
                --c-ok: #22c55e;
                --c-warn: #f59e0b;
                --c-err: #ef4444;
                --c-bg: #f4f5f7;
                --c-card: #fff;
                --c-card2: #f9fafb;
                --c-inp: #fff;
                --c-t1: #1a1a2e;
                --c-t2: #555570;
                --c-t3: #8888a0;
                --c-b1: rgba(0, 0, 0, 0.08);
                --c-b2: rgba(0, 0, 0, 0.14);
                --r-s: 6px;
                --r-m: 10px;
                --r-l: 14px;
                --r-xl: 18px;
                --sh-s: 0 1px 4px rgba(0, 0, 0, 0.07);
                --sh-m: 0 4px 14px rgba(0, 0, 0, 0.1);
                --sh-l: 0 8px 28px rgba(0, 0, 0, 0.13);
                --t1: 0.18s ease;
                --t2: 0.28s ease;
                --t3: 0.4s ease;
            }
            [data-theme="dark"] {
                --c-bg: #16162a;
                --c-card: #222240;
                --c-card2: #282848;
                --c-inp: #2c2c4c;
                --c-t1: #e4e4f0;
                --c-t2: #a8a8c4;
                --c-t3: #6e6e94;
                --c-b1: rgba(255, 255, 255, 0.07);
                --c-b2: rgba(255, 255, 255, 0.13);
            }
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                background: #0d1117;
                color: var(--c-t1);
                overflow: hidden;
                -webkit-font-smoothing: antialiased;
            }
            button {
                font-family: inherit;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes scaleIn {
                from {
                    opacity: 0;
                    transform: scale(0.95);
                }
                to {
                    opacity: 1;
                    transform: scale(1);
                }
            }
            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(12px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            @keyframes bob {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-5px);
                }
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.5;
                }
            }

            #c {
                position: fixed;
                inset: 0;
                display: block;
                z-index: 0;
            }

            /* ── Loader ── */
            #loader {
                position: fixed;
                inset: 0;
                z-index: 9999;
                background: linear-gradient(135deg, #0d1117, #161b28, #0d1117);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                transition:
                    opacity 0.5s,
                    visibility 0.5s;
            }
            #loader.done {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }
            #loader .logo-img {
                width: 80px;
                height: 80px;
                object-fit: contain;
                margin-bottom: 16px;
                border-radius: 16px;
            }
            #loader .logo-fallback {
                width: 72px;
                height: 72px;
                background: linear-gradient(
                    135deg,
                    var(--c-pri),
                    var(--c-pri-dk)
                );
                border-radius: 18px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 32px;
                margin-bottom: 16px;
                box-shadow: 0 6px 24px rgba(124, 179, 66, 0.3);
            }
            #loader h1 {
                color: #fff;
                font-size: 22px;
                font-weight: 700;
                margin-bottom: 6px;
                text-align: center;
                max-width: 300px;
            }
            #loader .tag {
                color: rgba(255, 255, 255, 0.4);
                font-size: 11px;
                letter-spacing: 2px;
                text-transform: uppercase;
                margin-bottom: 24px;
            }
            #loader .spin {
                width: 36px;
                height: 36px;
                border: 3px solid rgba(255, 255, 255, 0.1);
                border-top-color: var(--c-pri);
                border-radius: 50%;
                animation: spin 0.7s linear infinite;
                margin-bottom: 14px;
            }
            #loader .bar {
                width: 220px;
                height: 3px;
                background: rgba(255, 255, 255, 0.1);
                border-radius: 2px;
                overflow: hidden;
                margin-bottom: 6px;
            }
            #loader .bar i {
                display: block;
                height: 100%;
                width: 0%;
                background: linear-gradient(
                    90deg,
                    var(--c-pri),
                    var(--c-pri-lt)
                );
                border-radius: 2px;
                transition: width 0.2s;
            }
            #loader .pct {
                color: rgba(255, 255, 255, 0.35);
                font-size: 11px;
                margin-bottom: 4px;
            }
            #loader .asset-name {
                color: rgba(255, 255, 255, 0.2);
                font-size: 10px;
                margin-bottom: 20px;
                min-height: 14px;
            }
            #loader button {
                padding: 10px 28px;
                background: linear-gradient(
                    135deg,
                    var(--c-pri),
                    var(--c-pri-dk)
                );
                color: #fff;
                border: none;
                border-radius: var(--r-l);
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                opacity: 0;
                transform: translateY(8px);
                transition: all 0.3s;
                pointer-events: none;
            }
            #loader button.show {
                opacity: 1;
                transform: translateY(0);
                pointer-events: auto;
            }

            /* ── Header ── */
            #hdr {
                position: fixed;
                top: 12px;
                left: 14px;
                z-index: 100;
                display: flex;
                align-items: center;
                gap: 8px;
                animation: fadeIn 0.5s 0.3s both;
            }
            #hdr .logo {
                width: 34px;
                height: 34px;
                border-radius: var(--r-m);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
                box-shadow: var(--sh-m);
                overflow: hidden;
                background: linear-gradient(
                    135deg,
                    var(--c-pri),
                    var(--c-pri-dk)
                );
            }
            #hdr .logo img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            #hdr .name {
                font-size: 14px;
                font-weight: 700;
                color: #fff;
                text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
            }
            .hbtn {
                padding: 5px 12px;
                background: rgba(255, 255, 255, 0.12);
                backdrop-filter: blur(8px);
                border: 1px solid rgba(255, 255, 255, 0.14);
                border-radius: var(--r-m);
                color: #fff;
                font-size: 10.5px;
                font-weight: 500;
                cursor: pointer;
                transition: background var(--t1);
            }
            .hbtn:hover {
                background: rgba(255, 255, 255, 0.22);
            }

            /* ── Detail Panel ── */
            #detail {
                position: fixed;
                top: 14px;
                right: 14px;
                width: 350px;
                max-height: calc(100vh - 28px);
                z-index: 100;
                display: flex;
                flex-direction: column;
                background: var(--c-card);
                border-radius: var(--r-xl);
                border-right: 3px solid var(--c-pri);
                box-shadow: var(--sh-l);
                transition: all var(--t2);
                animation: scaleIn 0.4s 0.35s both;
                overflow: hidden;
            }
            #detail.shut .d-body {
                max-height: 0;
                min-height: 0;
                padding: 0 12px;
                opacity: 0;
                overflow: hidden;
            }
            .d-hdr {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 11px 12px;
                border-bottom: 1px solid var(--c-b1);
                cursor: pointer;
                user-select: none;
                flex-shrink: 0;
            }
            .d-hdr .ic {
                width: 28px;
                height: 28px;
                background: var(--c-pri-a);
                border-radius: var(--r-s);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
            }
            .d-hdr span {
                font-size: 12.5px;
                font-weight: 600;
                flex: 1;
                color: var(--c-t1);
            }
            .tog {
                width: 24px;
                height: 24px;
                background: var(--c-card2);
                border: 1px solid var(--c-b1);
                border-radius: var(--r-s);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                color: var(--c-t3);
                cursor: pointer;
                transition: all var(--t1);
                line-height: 1;
            }
            .tog:hover {
                background: var(--c-pri-a);
                color: var(--c-pri);
            }
            .d-body {
                padding: 12px;
                overflow-y: auto;
                min-height: 260px;
                transition: all var(--t2);
                flex: 1;
            }
            .d-body::-webkit-scrollbar {
                width: 4px;
            }
            .d-body::-webkit-scrollbar-thumb {
                background: var(--c-b2);
                border-radius: 2px;
            }

            .prj-hero {
                width: 100%;
                height: 120px;
                border-radius: var(--r-m);
                margin-bottom: 10px;
                overflow: hidden;
                background: #111;
                position: relative;
            }
            .prj-hero img,
            .prj-hero video {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }
            .prj-hero .ph-icon {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 40px;
            }
            .prj-desc {
                font-size: 11.5px;
                line-height: 1.6;
                color: var(--c-t2);
                background: var(--c-card2);
                padding: 10px;
                border-radius: var(--r-m);
                border: 1px solid var(--c-b1);
            }

            /* Unit card */
            .u-card {
                animation: fadeIn 0.3s;
                min-height: 140px;
            }
            .u-carousel {
                position: relative;
                width: 100%;
                height: 145px;
                border-radius: var(--r-m);
                overflow: hidden;
                margin-bottom: 10px;
                background: #111;
            }
            .u-carousel img,
            .u-carousel video {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }
            .u-carousel .mc {
                position: absolute;
                top: 6px;
                right: 6px;
                padding: 2px 7px;
                background: rgba(0, 0, 0, 0.6);
                border-radius: 8px;
                font-size: 9px;
                color: #fff;
                font-weight: 600;
            }
            .cb {
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                width: 26px;
                height: 26px;
                background: rgba(0, 0, 0, 0.5);
                backdrop-filter: blur(4px);
                border: none;
                border-radius: 50%;
                color: #fff;
                font-size: 12px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 2;
                transition: background var(--t1);
            }
            .cb:hover {
                background: rgba(0, 0, 0, 0.7);
            }
            .cb.p {
                left: 5px;
            }
            .cb.n {
                right: 5px;
            }
            .cdots {
                position: absolute;
                bottom: 6px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                gap: 3px;
                z-index: 2;
            }
            .cdot {
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.35);
                border: none;
                cursor: pointer;
                transition: all var(--t1);
            }
            .cdot.on {
                background: #fff;
                transform: scale(1.3);
            }
            .u-head {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 8px;
                flex-wrap: wrap;
                gap: 4px;
            }
            .u-name {
                font-size: 13px;
                font-weight: 700;
                color: var(--c-t1);
            }
            .badge {
                padding: 2px 8px;
                border-radius: 16px;
                font-size: 9.5px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.3px;
            }
            .b-ok {
                background: rgba(34, 197, 94, 0.14);
                color: var(--c-ok);
            }
            .b-warn {
                background: rgba(245, 158, 11, 0.14);
                color: var(--c-warn);
            }
            .b-err {
                background: rgba(239, 68, 68, 0.14);
                color: var(--c-err);
            }
            .u-type-label {
                font-size: 10px;
                color: var(--c-t3);
                margin-bottom: 8px;
            }
            .u-stats {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 5px;
                margin-bottom: 8px;
            }
            .u-st {
                text-align: center;
                padding: 6px 2px;
                background: var(--c-card2);
                border-radius: var(--r-s);
                border: 1px solid var(--c-b1);
            }
            .u-st small {
                display: block;
                font-size: 8px;
                color: var(--c-t3);
                text-transform: uppercase;
                letter-spacing: 0.3px;
                margin-bottom: 1px;
            }
            .u-st b {
                font-size: 11px;
                font-weight: 600;
                color: var(--c-t1);
            }
            .u-st b.pr {
                color: var(--c-pri);
            }
            .u-area-breakdown {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 4px;
                margin-bottom: 8px;
            }
            .u-ab {
                text-align: center;
                padding: 4px;
                background: var(--c-card2);
                border-radius: 4px;
                border: 1px solid var(--c-b1);
            }
            .u-ab small {
                display: block;
                font-size: 7.5px;
                color: var(--c-t3);
                text-transform: uppercase;
            }
            .u-ab b {
                font-size: 10px;
                color: var(--c-t1);
            }
            .u-desc {
                font-size: 11px;
                line-height: 1.55;
                color: var(--c-t2);
                background: var(--c-card2);
                padding: 8px;
                border-radius: var(--r-s);
                border: 1px solid var(--c-b1);
                margin-bottom: 8px;
            }
            .u-feats {
                display: flex;
                flex-wrap: wrap;
                gap: 3px;
                margin-bottom: 8px;
            }
            .u-feat {
                padding: 2px 7px;
                background: var(--c-pri-a);
                border-radius: 8px;
                font-size: 9px;
                color: var(--c-pri);
                font-weight: 600;
            }

            /* Functional areas */
            .fa-section {
                margin-bottom: 8px;
            }
            .fa-title {
                font-size: 10px;
                font-weight: 600;
                color: var(--c-t3);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 4px;
            }
            .fa-list {
                background: var(--c-card2);
                border: 1px solid var(--c-b1);
                border-radius: var(--r-s);
                overflow: hidden;
            }
            .fa-row {
                display: flex;
                justify-content: space-between;
                padding: 4px 8px;
                font-size: 10px;
                border-bottom: 1px solid var(--c-b1);
            }
            .fa-row:last-child {
                border-bottom: none;
            }
            .fa-row .fa-name {
                color: var(--c-t2);
            }
            .fa-row .fa-area {
                color: var(--c-t1);
                font-weight: 600;
            }

            .u-actions {
                display: flex;
                gap: 5px;
                flex-wrap: wrap;
            }
            .u-btn {
                flex: 1;
                min-width: 0;
                padding: 7px 6px;
                border: none;
                border-radius: var(--r-m);
                font-size: 10px;
                font-weight: 600;
                cursor: pointer;
                transition: all var(--t1);
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 3px;
                white-space: nowrap;
            }
            .u-btn-p {
                background: linear-gradient(
                    135deg,
                    var(--c-pri),
                    var(--c-pri-dk)
                );
                color: #fff;
            }
            .u-btn-p:hover {
                box-shadow: 0 3px 10px rgba(124, 179, 66, 0.3);
                transform: translateY(-1px);
            }
            .u-btn-s {
                background: var(--c-card2);
                color: var(--c-t2);
                border: 1px solid var(--c-b1);
            }
            .u-btn-s:hover {
                background: var(--c-pri-a);
                color: var(--c-pri);
            }

            /* Hotspot card */
            .hs-card {
                animation: fadeIn 0.3s;
            }
            .hs-head {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 8px;
            }
            .hs-ic {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
            }
            .hs-ti {
                font-size: 13px;
                font-weight: 700;
                color: var(--c-t1);
            }

            /* ── Search ── */
            #search {
                position: fixed;
                bottom: 14px;
                left: 50%;
                transform: translateX(-50%);
                width: 580px;
                max-width: calc(100% - 28px);
                z-index: 100;
                background: var(--c-card);
                border-radius: var(--r-xl);
                border-bottom: 3px solid var(--c-pri);
                box-shadow: var(--sh-l);
                transition: all var(--t2);
                animation: slideUp 0.4s 0.45s both;
                overflow: hidden;
            }
            #search.shut {
                height: 42px;
            }
            #search.shut .s-body {
                max-height: 0;
                padding: 0 12px;
                opacity: 0;
                overflow: hidden;
            }
            #search:not(.shut) {
                height: 265px;
            }
            .s-hdr {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 9px 12px;
                border-bottom: 1px solid var(--c-b1);
                cursor: pointer;
                user-select: none;
                flex-shrink: 0;
            }
            .s-hdr .ic {
                width: 24px;
                height: 24px;
                background: var(--c-pri-a);
                border-radius: var(--r-s);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
            }
            .s-hdr span {
                font-size: 12px;
                font-weight: 600;
                flex: 1;
                color: var(--c-t1);
            }
            .s-body {
                padding: 9px 12px;
                overflow-y: auto;
                transition: all var(--t2);
                flex: 1;
            }
            .sr {
                display: flex;
                gap: 5px;
                margin-bottom: 6px;
            }
            .si {
                flex: 1;
                padding: 6px 10px;
                background: var(--c-inp);
                border: 1px solid var(--c-b1);
                border-radius: var(--r-m);
                font-size: 12px;
                color: var(--c-t1);
                outline: none;
                transition: border var(--t1);
                font-family: inherit;
            }
            .si:focus {
                border-color: var(--c-pri);
            }
            .sb,
            .rb {
                padding: 6px 10px;
                border: none;
                border-radius: var(--r-m);
                font-size: 11px;
                font-weight: 600;
                cursor: pointer;
                transition: all var(--t1);
            }
            .sb {
                background: var(--c-pri);
                color: #fff;
            }
            .sb:hover {
                background: var(--c-pri-dk);
            }
            .rb {
                background: var(--c-card2);
                color: var(--c-t2);
                border: 1px solid var(--c-b1);
            }
            .rb:hover {
                background: var(--c-pri-a);
                color: var(--c-pri);
            }
            .fs {
                flex: 1;
                padding: 5px 8px;
                background: var(--c-inp);
                border: 1px solid var(--c-b1);
                border-radius: var(--r-s);
                font-size: 11px;
                color: var(--c-t1);
                outline: none;
                cursor: pointer;
                font-family: inherit;
            }
            .rg {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 5px;
                max-height: 120px;
                overflow-y: auto;
            }
            .rg::-webkit-scrollbar {
                width: 3px;
            }
            .rg::-webkit-scrollbar-thumb {
                background: var(--c-b2);
                border-radius: 2px;
            }
            .rc {
                padding: 6px 8px;
                background: var(--c-card2);
                border: 1px solid var(--c-b1);
                border-radius: var(--r-s);
                cursor: pointer;
                transition: all var(--t1);
            }
            .rc:hover {
                transform: translateY(-1px);
                box-shadow: var(--sh-m);
                border-color: var(--c-pri);
            }
            .rc.on {
                background: var(--c-pri-a);
                border-color: var(--c-pri);
            }
            .rn {
                font-size: 11px;
                font-weight: 700;
                color: var(--c-t1);
            }
            .ri {
                font-size: 9px;
                color: var(--c-t3);
            }
            .rp {
                font-size: 11px;
                font-weight: 700;
                color: var(--c-pri);
                margin-top: 1px;
            }
            .rs {
                display: inline-block;
                padding: 1px 5px;
                border-radius: 6px;
                font-size: 8px;
                font-weight: 600;
                text-transform: uppercase;
                margin-top: 2px;
            }

            /* ── Tools ── */
            #tools {
                position: fixed;
                left: 14px;
                top: 50%;
                transform: translateY(-50%);
                z-index: 100;
                display: flex;
                flex-direction: column;
                gap: 6px;
                animation: fadeIn 0.4s 0.55s both;

            .tb {

                height: 32px;

                backdrop-filter: blur(8px);
                border: 1px solid rgba(255, 255, 255, 0.13);

                color: #fff;

                align-items: center;

            .tb:hover {
                background: rgba(255, 255, 255, 0.22);

            .tb.on {
                background: var(--c-pri);

            /* ── Gallery widget ── */
            #gal {

            .gth {

                height: 40px;

                transition: transform var(--t3);

            .gth img {

                height: 100%;

            .gmore {
                width: 40px;
                height: 40px;
                border-radius: var(--r-m);
                background: rgba(0, 0, 0, 0.45);

                align-items: center;
                justify-content: center;
                font-size: 10px;
                font-weight: 700;
                color: #fff;

            .gtxt {
                margin-left: 8px;

            .gtxt .t1 {

                color: #fff;

            .gtxt .t2 {

            .gbtn {

                font-weight: 600;

            /* ── Hotspots ── */
            .hs {
                position: fixed;
                z-index: 50;
                cursor: pointer;
                transition: transform var(--t1);

            }
            .hs:hover {
                transform: scale(1.15);
            }
            .hs.sel {
                transform: scale(1.25);
            }
            .hs-dome {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                border: 2px solid #fff;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
                animation: bob 3s ease-in-out infinite;

            .hs-lbl {
                position: absolute;
                top: 100%;
                left: 50%;

                margin-top: 3px;
                padding: 2px 6px;
                background: rgba(0, 0, 0, 0.65);
                backdrop-filter: blur(4px);
                border-radius: 4px;
                font-size: 9px;
                font-weight: 600;
                color: #fff;
                white-space: nowrap;
            }

            /* ── Lightbox ── */
            #lb {
                position: fixed;
                inset: 0;
                z-index: 9000;
                background: rgba(0, 0, 0, 0.92);
                backdrop-filter: blur(6px);
                display: none;
                align-items: center;
                justify-content: center;
                flex-direction: column;

                display: flex;

                box-shadow: var(--sh-l);
            }
            #lb video.lb-media {
                outline: none;
            }
            .lb-x,
            .lb-n {
                position: absolute;
                background: rgba(255, 255, 255, 0.12);
                border: none;
                border-radius: 50%;
                color: #fff;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background var(--t1);
            }
            .lb-x:hover,
            .lb-n:hover {
                background: rgba(255, 255, 255, 0.25);
            }
            .lb-x {
                top: 16px;
                right: 16px;
                width: 36px;
                height: 36px;
                font-size: 16px;
            }
            .lb-n {
                top: 50%;
                transform: translateY(-50%);
                width: 40px;
                height: 40px;
                font-size: 15px;
            }
            .lb-n.p {
                left: 16px;
            }
            .lb-n.nx {
                right: 16px;
            }
            .lb-cnt {
                position: absolute;
                top: 16px;
                left: 16px;
                padding: 4px 10px;
                background: rgba(0, 0, 0, 0.5);
                border-radius: 14px;
                color: #fff;
                font-size: 11px;
            }
            .lb-type {
                position: absolute;
                top: 16px;
                left: 50%;
                transform: translateX(-50%);
                padding: 3px 9px;
                background: rgba(0, 0, 0, 0.5);

                color: #fff;
                font-size: 9px;
                text-transform: uppercase;
                letter-spacing: 0.8px;

            .lb-dots {
                position: absolute;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                gap: 6px;
            }
            .lb-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.25);
                border: none;
                cursor: pointer;
                transition: all var(--t1);
            }
            .lb-dot.on {
                background: #fff;
                transform: scale(1.3);
            }

            /* ── Project Details Modal ── */
            #pd {
                position: fixed;
                inset: 0;
                z-index: 8000;
                background: rgba(0, 0, 0, 0.55);

                align-items: center;
                justify-content: center;
            }
            #pd.open {
                display: flex;
            }
            .pd-m {
                width: 92%;

            .pd-h {

            .pd-h .ic {

                height: 36px;

                border-radius: var(--r-m);

                align-items: center;
                justify-content: center;
                font-size: 16px;
                overflow: hidden;
            }
            .pd-h .ic img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            .pd-h .ti {
                flex: 1;
                font-size: 16px;
                font-weight: 700;
                color: var(--c-t1);
            }
            .mcl {
                width: 28px;
                height: 28px;
                background: var(--c-card2);
                border: 1px solid var(--c-b1);
                border-radius: var(--r-s);
                color: var(--c-t3);
                font-size: 14px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all var(--t1);
            }
            .mcl:hover {
                background: rgba(239, 68, 68, 0.1);
                color: var(--c-err);
            }
            .pd-b {
                padding: 16px 18px;
            }
            .pd-b > p {
                font-size: 12.5px;
                line-height: 1.65;
                color: var(--c-t2);
                margin-bottom: 14px;
            }
            .pd-section {
                margin-bottom: 14px;
            }
            .pd-section-title {
                font-size: 10px;
                font-weight: 700;
                color: var(--c-t3);
                text-transform: uppercase;
                letter-spacing: 0.8px;
                margin-bottom: 8px;
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .pd-detail-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 6px;
                margin-bottom: 14px;
            }
            .pd-detail {
                padding: 8px 10px;
                background: var(--c-card2);
                border-radius: var(--r-s);
                border: 1px solid var(--c-b1);
            }
            .pd-detail small {
                display: block;
                font-size: 8px;
                color: var(--c-t3);
                text-transform: uppercase;
                margin-bottom: 2px;
            }
            .pd-detail b {
                font-size: 12px;
                color: var(--c-t1);
            }
            .pd-feats {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 6px;
                margin-bottom: 14px;
            }
            .pd-f {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 7px 10px;
                background: var(--c-card2);
                border-radius: var(--r-m);
                border: 1px solid var(--c-b1);
            }
            .pd-f .fi {
                font-size: 15px;
            }
            .pd-f .ft {
                font-size: 11px;
                font-weight: 500;
                color: var(--c-t2);
            }
            .pd-amenities {
                display: flex;
                flex-wrap: wrap;
                gap: 5px;
                margin-bottom: 14px;
            }
            .pd-am {
                padding: 4px 8px;
                background: var(--c-card2);
                border: 1px solid var(--c-b1);
                border-radius: 8px;
                font-size: 10px;
                color: var(--c-t2);
                display: flex;
                align-items: center;
                gap: 4px;
            }
            .pd-nearby {
                margin-bottom: 14px;
            }
            .pd-nr {
                display: flex;
                justify-content: space-between;
                padding: 5px 8px;
                background: var(--c-card2);
                border: 1px solid var(--c-b1);
                border-radius: 4px;
                margin-bottom: 3px;
                font-size: 10px;
            }
            .pd-nr .nr-name {
                color: var(--c-t1);
                display: flex;
                align-items: center;
                gap: 4px;
            }
            .pd-nr .nr-dist {
                color: var(--c-t3);
            }
            .pd-map {
                width: 100%;
                height: 160px;
                border-radius: var(--r-m);
                overflow: hidden;
                margin-bottom: 8px;
                background: var(--c-card2);
            }
            .pd-map iframe {
                width: 100%;
                height: 100%;
                border: none;
            }
            .pd-ml {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
                width: 100%;
                padding: 8px;
                background: var(--c-card2);
                border: 1px solid var(--c-b1);
                border-radius: var(--r-m);
                color: var(--c-pri);
                font-size: 11px;
                font-weight: 600;
                text-decoration: none;
                transition: background var(--t1);
            }
            .pd-ml:hover {
                background: var(--c-pri-a);
            }

            /* ── Floor Plan Modal ── */
            #fp {
                position: fixed;
                inset: 0;
                z-index: 8500;
                background: rgba(0, 0, 0, 0.55);
                backdrop-filter: blur(5px);
                display: none;
                align-items: center;
                justify-content: center;
            }
            #fp.open {
                display: flex;
            }
            .fp-m {
                width: 92%;
                max-width: 700px;
                background: var(--c-card);
                border-radius: var(--r-xl);
                box-shadow: var(--sh-l);
                overflow: hidden;
                animation: scaleIn 0.25s;
            }
            .fp-hd {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 12px 16px;
                border-bottom: 1px solid var(--c-b1);
            }
            .fp-hd .ti {
                flex: 1;
                font-size: 14px;
                font-weight: 700;
                color: var(--c-t1);
            }
            .fp-tog {
                display: flex;
                gap: 2px;
                background: var(--c-card2);
                border-radius: var(--r-s);
                padding: 2px;
            }
            .fp-tb {
                padding: 4px 10px;
                border: none;
                border-radius: 3px;
                font-size: 10px;
                font-weight: 600;
                cursor: pointer;
                color: var(--c-t3);
                background: transparent;
                transition: all var(--t1);
            }
            .fp-tb.on {
                background: var(--c-pri);
                color: #fff;
            }
            .fp-bd {
                padding: 12px 16px;
            }
            .fp-nav {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                margin-bottom: 8px;
            }
            .fp-nb {
                width: 26px;
                height: 26px;
                background: var(--c-card2);
                border: 1px solid var(--c-b1);
                border-radius: var(--r-s);
                color: var(--c-t2);
                font-size: 12px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .fp-fl {
                padding: 3px 10px;
                background: var(--c-pri-a);
                border-radius: 14px;
                font-size: 11px;
                font-weight: 600;
                color: var(--c-pri);
            }
            .fp-uc {
                font-size: 9px;
                color: var(--c-t3);
            }
            .fp-view {
                width: 100%;
                height: 380px;
                border-radius: var(--r-m);
                border: 1px solid var(--c-b1);
                overflow: hidden;
                margin-bottom: 8px;
                position: relative;
                background: #111;
            }
            .fp-view canvas {
                width: 100%;
                height: 100%;
                display: block;
            }
            .fp-view .fp-info {
                position: absolute;
                bottom: 8px;
                left: 8px;
                padding: 3px 8px;
                background: rgba(0, 0, 0, 0.6);
                border-radius: 6px;
                color: #fff;
                font-size: 9px;
            }
            .fp-leg {
                display: flex;
                gap: 12px;
                justify-content: center;
                flex-wrap: wrap;
            }
            .fp-li {
                display: flex;
                align-items: center;
                gap: 4px;
                font-size: 9px;
                color: var(--c-t2);
            }
            .fp-lc {
                width: 10px;
                height: 10px;
                border-radius: 2px;
            }

            /* ── Panorama Modal ── */
            #pano {
                position: fixed;
                inset: 0;
                z-index: 8800;
                background: #000;
                display: none;
                flex-direction: column;
            }
            #pano.open {
                display: flex;
            }
            #pano canvas {
                flex: 1;
            }
            #pano .pano-hud {
                position: absolute;
                top: 14px;
                left: 50%;
                transform: translateX(-50%);
                padding: 5px 14px;
                background: rgba(0, 0, 0, 0.6);
                border-radius: 12px;
                color: #fff;
                font-size: 11px;
                font-weight: 600;
                z-index: 1;
                display: flex;
                align-items: center;
                gap: 6px;
            }
            #pano .pano-x {
                position: absolute;
                top: 14px;
                right: 14px;
                width: 36px;
                height: 36px;
                background: rgba(255, 255, 255, 0.15);
                border: none;
                border-radius: 50%;
                color: #fff;
                font-size: 16px;
                cursor: pointer;
                z-index: 1;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            #pano .pano-hint {
                position: absolute;
                bottom: 18px;
                left: 50%;
                transform: translateX(-50%);
                padding: 5px 12px;
                background: rgba(0, 0, 0, 0.5);
                border-radius: 8px;
                color: rgba(255, 255, 255, 0.45);
                font-size: 10px;
                z-index: 1;
                animation: pulse 2s infinite;
            }

            /* ── 2D Floor Plan Image Modal ── */
            #fp2d-modal {
                position: fixed;
                inset: 0;
                z-index: 8600;
                background: rgba(0, 0, 0, 0.88);
                backdrop-filter: blur(6px);
                display: none;
                align-items: center;
                justify-content: center;
            }
            #fp2d-modal.open {
                display: flex;
            }
            #fp2d-modal img {
                max-width: 88vw;
                max-height: 85vh;
                object-fit: contain;
                border-radius: var(--r-l);
                animation: scaleIn 0.25s;
            }
            #fp2d-modal .fp2d-x {
                position: absolute;
                top: 16px;
                right: 16px;
                width: 36px;
                height: 36px;
                background: rgba(255, 255, 255, 0.15);
                border: none;
                border-radius: 50%;
                color: #fff;
                font-size: 16px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            @media (max-width: 1024px) {
                #detail {
                    width: 280px;
                }
                #search {
                    width: 480px;
                }
            }
            @media (max-width: 768px) {
                #detail {
                    width: 260px;
                    top: 52px;
                    right: 8px;
                }
                #search {
                    width: calc(100% - 14px);
                    bottom: 8px;
                }
                #tools {
                    left: 8px;
                }
                #gal {
                    right: 8px;
                    bottom: 8px;
                }
                .gtxt {
                    display: none;
                }
                .sr.fil {
                    flex-direction: column;
                }
                .fp-view {
                    height: 260px;
                }
            }
            @media (max-width: 480px) {
                #detail {
                    width: calc(100% - 14px);
                    right: 7px;
                    top: auto;
                    bottom: 52px;
                    max-height: 42vh;
                }
                #hdr {
                    left: 7px;
                    top: 7px;
                }
                #hdr .name {
                    font-size: 12px;
                }
                #tools {
                    left: 7px;
                    top: auto;
                    bottom: 58px;
                    transform: none;
                    flex-direction: row;
                }
                .tb {
                    width: 28px;
                    height: 28px;
                    font-size: 11px;
                }
                #gal {
                    display: none;
                }
                .fp-view {
                    height: 200px;
                }
            }
        </style>
    </head>

                <div class="fp-bd">

                        ><span class="fp-fl" id="fp-fl">Floor 1</span

        <div id="fp2d-modal">

                class="fp2d-x"

        <div id="hs-box"></div>

        <script type="importmap">
            {
                "imports": {
                    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
                    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
                }
            }
        </script>
        <script type="module">
            import * as THREE from "three";
            import { OrbitControls } from "three/addons/controls/OrbitControls.js";
            import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
            import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";
            import { MeshoptDecoder } from "three/addons/libs/meshopt_decoder.module.js";
            import { RGBELoader } from "three/addons/loaders/RGBELoader.js";

            const CFG = {
                dataPath: window.__DATA_PATH || "tour-data.json",
                zoomStep: 5,
                flyDur: 1200,
            };
            let TD = null;

            // ═══════════════════════════════════════════════
            // ASSET LOADER
            // ═══════════════════════════════════════════════
            const Loader = (() => {
                let loaded = 0,
                    total = 0;
                const bar = () => document.getElementById("lbar");
                const pct = () => document.getElementById("lpct");
                const asset = () => document.getElementById("l-asset");

                function upd(label) {
                    const p = total ? Math.round((loaded / total) * 100) : 0;
                    bar().style.width = p + "%";
                    pct().textContent = p + "%";
                    if (label) asset().textContent = label;
                }

                function track(name, promise) {
                    total++;
                    return promise
                        .then((r) => {
                            loaded++;
                            upd(name + " ✓");
                            return r;
                        })
                        .catch((e) => {
                            loaded++;
                            upd(name + " ✗");
                            throw e;
                        });
                }

                async function loadJSON(url) {
                    return track(
                        "Tour data",
                        fetch(url).then((r) => {
                            if (!r.ok) throw new Error(`HTTP ${r.status}`);
                            return r.json();
                        }),
                    );
                }

                function loadGLB(url, label) {
                    return track(
                        label || "Model",
                        new Promise((res, rej) => {
                            const l = new GLTFLoader();
                            const d = new DRACOLoader();
                            d.setDecoderPath(
                                "https://www.gstatic.com/draco/versioned/decoders/1.5.6/",
                            );
                            l.setDRACOLoader(d);
                            l.setMeshoptDecoder(MeshoptDecoder);
                            l.load(
                                url,
                                (g) => res(g),
                                (xhr) => {
                                    if (xhr.total)
                                        asset().textContent = `${label || "Model"} ${Math.round((xhr.loaded / xhr.total) * 100)}%`;
                                },
                                rej,
                            );
                        }),
                    );
                }

                function loadHDRI(url) {
                    return track(
                        "Environment",
                        new Promise((res, rej) => {
                            new RGBELoader().load(
                                url,
                                (t) => {
                                    t.mapping =
                                        THREE.EquirectangularReflectionMapping;
                                    res(t);
                                },
                                undefined,
                                rej,
                            );
                        }),
                    );
                }

                function preloadImages(urls) {
                    if (!urls || !urls.length) return Promise.resolve([]);
                    return track(
                        `${urls.length} images`,
                        Promise.allSettled(
                            urls.map(
                                (u) =>
                                    new Promise((r, j) => {
                                        const i = new Image();
                                        i.crossOrigin = "anonymous";
                                        i.onload = () => r(i);
                                        i.onerror = j;
                                        i.src = u;
                                    }),
                            ),
                        ),
                    );
                }

                function finish() {
                    upd("Ready!");
                    document.getElementById("lbtn").classList.add("show");
                }

                return {
                    loadJSON,
                    loadGLB,
                    loadHDRI,
                    preloadImages,
                    finish,
                    upd,
                };
            })();

            // ═══════════════════════════════════════════════
            // ENGINE
            // ═══════════════════════════════════════════════
            const Engine = (() => {
                let renderer,
                    scene,
                    camera,
                    controls,
                    defCam,
                    defTgt,
                    flying = false;

                function init() {
                    const canvas = document.getElementById("c");
                    renderer = new THREE.WebGLRenderer({
                        canvas,
                        antialias: true,
                        powerPreference: "high-performance",
                    });
                    renderer.setSize(innerWidth, innerHeight);
                    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
                    renderer.shadowMap.enabled = true;
                    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                    renderer.toneMapping = THREE.ACESFilmicToneMapping;
                    renderer.toneMappingExposure = 1.2;
                    renderer.outputColorSpace = THREE.SRGBColorSpace;
                    scene = new THREE.Scene();
                    scene.fog = new THREE.Fog(0x0f172a, 60, 200);
                    camera = new THREE.PerspectiveCamera(
                        50,
                        innerWidth / innerHeight,
                        0.1,
                        500,
                    );
                    controls = new OrbitControls(camera, renderer.domElement);
                    controls.enableDamping = true;
                    controls.dampingFactor = 0.06;
                    controls.minDistance = 2;
                    controls.maxDistance = 150;
                    controls.maxPolarAngle = Math.PI / 2 - 0.02;
                    addEventListener("resize", () => {
                        camera.aspect = innerWidth / innerHeight;
                        camera.updateProjectionMatrix();
                        renderer.setSize(innerWidth, innerHeight);
                    });
                }

                function configure(data) {
                    defCam = new THREE.Vector3(
                        ...(data.defaultCamera || [0, 8, 22]),
                    );
                    defTgt = new THREE.Vector3(
                        ...(data.defaultTarget || [0, 0, 0]),
                    );
                    camera.position.copy(defCam);
                    controls.target.copy(defTgt);
                    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
                    const sun = new THREE.DirectionalLight(0xfff5e6, 1.8);
                    sun.position.set(10, 25, 12);
                    sun.castShadow = true;
                    sun.shadow.mapSize.set(2048, 2048);
                    sun.shadow.camera.near = 0.5;
                    sun.shadow.camera.far = 80;
                    sun.shadow.camera.left = sun.shadow.camera.bottom = -30;
                    sun.shadow.camera.right = sun.shadow.camera.top = 30;
                    sun.shadow.bias = -0.001;
                    scene.add(sun);
                    scene.add(
                        new THREE.DirectionalLight(0x8899cc, 0.4)
                            .translateX(-10)
                            .translateY(8)
                            .translateZ(-6),
                    );
                    const gnd = new THREE.Mesh(
                        new THREE.PlaneGeometry(200, 200),
                        new THREE.MeshStandardMaterial({
                            color: 0x141e30,
                            roughness: 0.85,
                            metalness: 0.1,
                        }),
                    );
                    gnd.rotation.x = -Math.PI / 2;
                    gnd.position.y = -0.05;
                    gnd.receiveShadow = true;
                    scene.add(gnd);
                }

                function setEnv(tex) {
                    scene.environment = tex;
                    scene.background = tex;
                }
                function setFallbackBg() {
                    const cv = document.createElement("canvas");
                    cv.width = cv.height = 512;
                    const cx = cv.getContext("2d");
                    const g = cx.createLinearGradient(0, 0, 0, 512);
                    g.addColorStop(0, "#1e3050");
                    g.addColorStop(0.45, "#0f172a");
                    g.addColorStop(1, "#080c14");
                    cx.fillStyle = g;
                    cx.fillRect(0, 0, 512, 512);
                    cx.filter = "blur(24px)";
                    cx.drawImage(cv, 0, 0);
                    const t = new THREE.CanvasTexture(cv);
                    t.mapping = THREE.EquirectangularReflectionMapping;
                    scene.background = t;
                    scene.environment = t;
                }

                function flyTo(pos, look, dur = CFG.flyDur) {
                    return new Promise((res) => {
                        if (flying) return res();
                        flying = true;
                        controls.enabled = false;
                        const sp = camera.position.clone(),
                            st = controls.target.clone(),
                            t0 = performance.now();
                        const ease = (t) =>
                            t < 0.5 ? 4 * t * t * t : 1 - (-2 * t + 2) ** 3 / 2;
                        (function step(now) {
                            const p = Math.min((now - t0) / dur, 1),
                                e = ease(p);
                            camera.position.lerpVectors(sp, pos, e);
                            controls.target.lerpVectors(st, look, e);
                            controls.update();
                            if (p < 1) requestAnimationFrame(step);
                            else {
                                flying = false;
                                controls.enabled = true;
                                res();
                            }
                        })(t0);
                    });
                }

                function zoom(dir) {
                    const d = new THREE.Vector3();
                    camera.getWorldDirection(d);
                    const nv = camera.position
                        .clone()
                        .add(d.multiplyScalar(dir * CFG.zoomStep));
                    const dist = nv.distanceTo(controls.target);
                    if (dist >= 2 && dist <= 150) camera.position.copy(nv);
                }
                function resetView() {
                    return flyTo(defCam.clone(), defTgt.clone());
                }

                const _pv = new THREE.Vector3();
                function project(pos) {
                    _pv.copy(pos).project(camera);
                    if (_pv.z > 1 || _pv.z < -1) return null;
                    return {
                        x: (_pv.x * 0.5 + 0.5) * innerWidth,
                        y: (-_pv.y * 0.5 + 0.5) * innerHeight,
                    };
                }
                function render() {
                    controls.update();
                    renderer.render(scene, camera);
                }

                return {
                    init,
                    configure,
                    setEnv,
                    setFallbackBg,
                    flyTo,
                    zoom,
                    resetView,
                    project,
                    render,
                    isFlying: () => flying,
                    scene: () => scene,
                    camera: () => camera,
                    controls: () => controls,
                    renderer: () => renderer,
                };
            })();

            // ═══════════════════════════════════════════════
            // MODEL + AUTO-TAG
            // ═══════════════════════════════════════════════
            const Model = (() => {
                const map = new Map();
                function loadBuilding(gltf) {
                    const root = gltf.scene;
                    const t = TD.modelTransform || {};
                    if (t.position) root.position.set(...t.position);
                    if (t.rotation)
                        root.rotation.set(
                            ...t.rotation.map((v) => (v * Math.PI) / 180),
                        );
                    if (t.scale) {
                        const s = Array.isArray(t.scale)
                            ? t.scale
                            : [t.scale, t.scale, t.scale];
                        root.scale.set(...s);
                    }

                    root.updateMatrixWorld(true);

                    let matched = 0,
                        totalMeshes = 0;
                    const allNames = [];
                    const seen = new Set();
                    root.traverse((child) => {
                        if (child.isMesh) {
                            totalMeshes++;
                            child.castShadow = true;
                            child.receiveShadow = true;
                            const nodeName = child.name?.trim() || "";
                            const geomName = child.geometry?.name?.trim() || "";

                            if (allNames.length < 60) {
                                allNames.push({
                                    node: nodeName || "(empty)",
                                    geom: geomName || "(empty)",
                                });
                            }

                            const names = [nodeName, geomName].filter((n) => n);
                            const norm = (s) =>
                                s.toLowerCase().replace(/[\s_\-\.]/g, "");

                            const unit = TD.units.find((u) => {
                                if (seen.has(u.id)) return false;
                                return names.some(
                                    (name) =>
                                        u.meshName === name ||
                                        u.unitNumber === name ||
                                        u.name === name ||
                                        u.id === name ||
                                        norm(name) === norm(u.meshName || "") ||
                                        norm(name) === norm(u.name) ||
                                        norm(name) === norm(u.unitNumber),
                                );
                            });

                            if (unit) {
                                seen.add(unit.id);
                                matched++;
                                map.set(unit.id, child);
                                child.geometry.computeBoundingBox();
                                const box = child.geometry.boundingBox
                                    .clone()
                                    .applyMatrix4(child.matrixWorld);
                                unit._meshBBox = box;
                                unit._mesh = child;
                                child.userData = {
                                    unitId: unit.id,
                                    isUnit: true,
                                };
                            }
                        }
                    });

                    console.log(
                        "[Model] Total meshes:",
                        totalMeshes,
                        "| Matched",
                        matched,
                        "/",
                        TD.units.length,
                    );
                    console.log(
                        "[Model] First 40 names:",
                        allNames.slice(0, 40),
                    );
                    Engine.scene().add(root);
                    return root;
                }

                function buildFallback() {
                    const g = new THREE.Group();
                    // Simple multi-floor placeholder
                    const floors = TD.projectDetails?.totalFloors || 17;
                    const floorH = 3.2;
                    for (let i = 0; i < floors; i++) {
                        const slab = new THREE.Mesh(
                            new THREE.BoxGeometry(28, 0.08, 16),
                            new THREE.MeshStandardMaterial({
                                color: 0x556688,
                                roughness: 0.45,
                                metalness: 0.3,
                            }),
                        );
                        slab.position.set(0, i * floorH, -3);
                        slab.castShadow = true;
                        g.add(slab);
                    }
                    const shell = new THREE.Mesh(
                        new THREE.BoxGeometry(28, floors * floorH, 16),
                        new THREE.MeshStandardMaterial({
                            color: 0x2a3a5a,
                            roughness: 0.25,
                            metalness: 0.65,
                            transparent: true,
                            opacity: 0.3,
                        }),
                    );
                    shell.position.set(0, (floors * floorH) / 2, -3);
                    shell.castShadow = true;
                    g.add(shell);
                    // Top accent
                    const top = new THREE.Mesh(
                        new THREE.BoxGeometry(28, 0.15, 16),
                        new THREE.MeshStandardMaterial({
                            color: 0x7cb342,
                            roughness: 0.4,
                            metalness: 0.5,
                        }),
                    );
                    top.position.set(0, floors * floorH, -3);
                    g.add(top);
                    Engine.scene().add(g);
                }

                return { loadBuilding, buildFallback, map };
            })();

            // ═══════════════════════════════════════════════
            // UNITS
            // ═══════════════════════════════════════════════
            const Units = (() => {
                const meshes = [];
                let selected = null;
                const rc = new THREE.Raycaster(),
                    ms = new THREE.Vector2();

                function build() {
                    const sc = TD.statusColors ||
                        CFG.statusCol || {
                            Available: "#22c55e",
                            Reserved: "#f59e0b",
                            Sold: "#ef4444",
                        };
                    TD.units.forEach((u) => {
                        if (u._mesh) {
                            const ov = u._mesh.clone();
                            ov.material = new THREE.MeshBasicMaterial({
                                color: new THREE.Color(
                                    sc[u.status] || "#22c55e",
                                ),
                                transparent: true,
                                opacity: 0,
                                depthWrite: false,
                                side: THREE.DoubleSide,
                            });
                            ov.userData = {
                                id: u.id,
                                unit: u,
                                isOverlay: true,
                            };
                            ov.renderOrder = 999;
                            Engine.scene().add(ov);
                            meshes.push(ov);
                            u._mesh.userData = { id: u.id, unit: u };
                            meshes.push(u._mesh);
                        } else if (u.bbox) {
                            const mn = new THREE.Vector3(...u.bbox.min),
                                mx = new THREE.Vector3(...u.bbox.max);
                            const sz = new THREE.Vector3().subVectors(mx, mn),
                                ct = new THREE.Vector3()
                                    .addVectors(mn, mx)
                                    .multiplyScalar(0.5);
                            const col = sc[u.status] || "#22c55e";
                            const mat = new THREE.MeshBasicMaterial({
                                color: new THREE.Color(col),
                                transparent: true,
                                opacity: 0.16,
                                depthWrite: false,
                            });
                            const mesh = new THREE.Mesh(
                                new THREE.BoxGeometry(sz.x, sz.y, sz.z),
                                mat,
                            );
                            mesh.position.copy(ct);
                            mesh.userData = { id: u.id, unit: u };
                            mesh.add(
                                new THREE.LineSegments(
                                    new THREE.EdgesGeometry(mesh.geometry),
                                    new THREE.LineBasicMaterial({
                                        color: new THREE.Color(col),
                                        transparent: true,
                                        opacity: 0.45,
                                    }),
                                ),
                            );
                            Engine.scene().add(mesh);
                            meshes.push(mesh);
                        }
                    });
                }

                function onClick(e) {
                    if (Engine.isFlying()) return;
                    ms.x = (e.clientX / innerWidth) * 2 - 1;
                    ms.y = -(e.clientY / innerHeight) * 2 + 1;
                    rc.setFromCamera(ms, Engine.camera());
                    const hits = rc.intersectObjects(meshes, false);
                    if (hits.length) {
                        const ud = hits[0].object.userData;
                        if (ud.unit) select(ud.unit);
                    }
                }

                function select(unit) {
                    deselect();
                    selected = unit;
                    meshes.forEach((m) => {
                        if (m.userData.id === unit.id) {
                            if (m.userData.isOverlay) m.material.opacity = 0.3;
                            else if (m.material.transparent)
                                m.material.opacity = 0.35;
                        }
                    });
                    let center;
                    if (unit._meshBBox) {
                        center = new THREE.Vector3();
                        unit._meshBBox.getCenter(center);
                    } else if (unit.bbox) {
                        center = new THREE.Vector3(
                            (unit.bbox.min[0] + unit.bbox.max[0]) / 2,
                            (unit.bbox.min[1] + unit.bbox.max[1]) / 2,
                            (unit.bbox.min[2] + unit.bbox.max[2]) / 2,
                        );
                    } else center = new THREE.Vector3(0, 10, 0);
                    Engine.flyTo(
                        center.clone().add(new THREE.Vector3(4, 3, 8)),
                        center,
                    );
                    UI.expandDetail();
                    UI.showUnitCard(unit);
                    Search.highlight(unit.id);
                }

                function deselect() {
                    selected = null;
                    meshes.forEach((m) => {
                        if (m.userData.isOverlay) m.material.opacity = 0;
                        else if (m.material.transparent && m.userData.unit)
                            m.material.opacity = 0.16;
                    });
                }

                return {
                    build,
                    onClick,
                    select,
                    deselect,
                    selected: () => selected,
                };
            })();

            // ═══════════════════════════════════════════════
            // HOTSPOTS
            // ═══════════════════════════════════════════════
            const Hotspots = (() => {
                const items = [];
                function build() {
                    if (!TD.hotspots) return;
                    const box = document.getElementById("hs-box");
                    TD.hotspots.forEach((h) => {
                        const el = document.createElement("div");
                        el.className = "hs";
                        el.innerHTML = `<div class="hs-dome" style="background:${h.color}">${h.icon}</div><div class="hs-lbl">${h.label}</div>`;
                        el.onclick = () => select(h);
                        box.appendChild(el);
                        items.push({
                            el,
                            pos: new THREE.Vector3(...h.position),
                            data: h,
                        });
                    });
                }
                function update() {
                    items.forEach(({ el, pos }) => {
                        const p = Engine.project(pos);
                        if (
                            !p ||
                            p.x < -50 ||
                            p.x > innerWidth + 50 ||
                            p.y < -50 ||
                            p.y > innerHeight + 50
                        ) {
                            el.style.display = "none";
                            return;
                        }
                        el.style.display = "block";
                        el.style.left = p.x + "px";
                        el.style.top = p.y + "px";
                        el.style.transform = "translate(-50%,-50%)";
                    });
                }
                function select(h) {
                    items.forEach(({ el, data }) =>
                        el.classList.toggle("sel", data.id === h.id),
                    );
                    Units.deselect();
                    Search.highlight(null);
                    const hp = new THREE.Vector3(...h.position);
                    Engine.flyTo(
                        hp.clone().add(new THREE.Vector3(3, 3, 6)),
                        hp,
                    );
                    UI.expandDetail();
                    UI.showHotspotCard(h);
                }
                function clear() {
                    items.forEach(({ el }) => el.classList.remove("sel"));
                }
                return { build, update, select, clear };
            })();

            // ═══════════════════════════════════════════════
            // SEARCH
            // ═══════════════════════════════════════════════
            const Search = (() => {
                let deb = null;
                function init() {
                    const types = [...new Set(TD.units.map((u) => u.type))];
                    const tSel = document.getElementById("fT");
                    tSel.innerHTML = '<option value="">All Types</option>';
                    types.forEach((t) => {
                        const o = document.createElement("option");
                        o.value = t;
                        o.textContent = t;
                        tSel.appendChild(o);
                    });
                    const floors = [
                        ...new Set(TD.units.map((u) => u.floor)),
                    ].sort((a, b) => a - b);
                    const fSel = document.getElementById("fF");
                    floors.forEach((f) => {
                        const o = document.createElement("option");
                        o.value = f;
                        o.textContent = `Floor ${f}`;
                        fSel.appendChild(o);
                    });
                    render(TD.units);
                }
                function filter() {
                    const q = document.getElementById("q").value.toLowerCase();
                    const ft = document.getElementById("fT").value,
                        fs = document.getElementById("fS").value,
                        ff = document.getElementById("fF").value;
                    const res = TD.units.filter((u) => {
                        if (
                            q &&
                            !u.name.toLowerCase().includes(q) &&
                            !u.type.toLowerCase().includes(q) &&
                            !(u.description || "").toLowerCase().includes(q) &&
                            !u.unitNumber.includes(q)
                        )
                            return false;
                        if (ft && u.type !== ft) return false;
                        if (fs && u.status !== fs) return false;
                        if (ff && u.floor !== +ff) return false;
                        return true;
                    });
                    render(res);
                }
                function render(units) {
                    const grid = document.getElementById("rg");
                    if (!units.length) {
                        grid.innerHTML =
                            '<div style="grid-column:1/-1;text-align:center;padding:16px;color:var(--c-t3)"><div style="font-size:20px;margin-bottom:4px">🔍</div><div style="font-size:11px">No units found</div></div>';
                        return;
                    }
                    const sc = TD.statusColors || {};
                    const sel = Units.selected();
                    grid.innerHTML = units
                        .map((u) => {
                            const c = sc[u.status] || "#22c55e";
