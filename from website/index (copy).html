                            return `<div class="rc${sel && sel.id === u.id ? " on" : ""}" data-uid="${u.id}"><div class="rn">${u.name}</div><div class="ri">${u.type} · F${u.floor} · ${u.areaBreakdown ? u.areaBreakdown.total : u.area}m²</div><div class="rp">${u.priceFormatted || "$" + u.price?.toLocaleString() || "TBD"}</div><span class="rs" style="background:${c}18;color:${c}">${u.status}</span></div>`;
                        })
                        .join("");
                    grid.querySelectorAll(".rc").forEach((card) => {
                        card.onclick = () => {
                            const u = TD.units.find(
                                (x) => x.id === card.dataset.uid,
                            );
                            if (u) Units.select(u);
                        };
                    });
                }
                function highlight(id) {
                    document
                        .querySelectorAll(".rc")
                        .forEach((c) =>
                            c.classList.toggle("on", c.dataset.uid === id),
                        );
                }
                function reset() {
                    document.getElementById("q").value = "";
                    document.getElementById("fT").value = "";
                    document.getElementById("fS").value = "";
                    document.getElementById("fF").value = "";
                    render(TD.units);
                }
                function debounceFilter() {
                    clearTimeout(deb);
                    deb = setTimeout(filter, 150);
                }
                return { init, filter, debounceFilter, highlight, reset };
            })();

            // ═══════════════════════════════════════════════
            // GALLERY & LIGHTBOX
            // ═══════════════════════════════════════════════
            const Gallery = (() => {
                let items = [],
                    idx = 0,
                    mediaEl = null,
                    orig = null;
                function isVid(url) {
                    if (!url) return false;
                    const e = url.split(".").pop().toLowerCase().split("?")[0];
                    return ["mp4", "webm", "mov", "ogg"].includes(e);
                }
                function init() {
                    items = (TD.gallery || []).map((g) => ({
                        url: g.url || g,
                        type: g.type || (isVid(g.url || g) ? "video" : "image"),
                        label: g.label || "",
                    }));
                    const box = document.getElementById("gal-th");
                    box.innerHTML = "";
                    items.slice(0, 3).forEach((it) => {
                        const d = document.createElement("div");
                        d.className = "gth";
                        if (it.url && it.type === "image") {
                            d.innerHTML = `<img src="${it.url}" alt="" loading="lazy">`;
                        } else {
                            d.style.cssText =
                                "background:linear-gradient(135deg,#1a3050,#0d1820);display:flex;align-items:center;justify-content:center;font-size:16px";
                            d.textContent = it.type === "video" ? "🎬" : "📷";
                        }
                        box.appendChild(d);
                    });
                    if (items.length > 3) {
                        const m = document.createElement("div");
                        m.className = "gmore";
                        m.textContent = `+${items.length - 3}`;
                        box.appendChild(m);
                    }
                    document.getElementById("gal-cnt").textContent =
                        `${items.length} items`;
                    document.getElementById("gal").onclick = () => open(0);
                }
                function open(i) {
                    idx = i;
                    document.getElementById("lb").classList.add("open");
                    refresh();
                }
                function close() {
                    document.getElementById("lb").classList.remove("open");
                    if (mediaEl) {
                        if (mediaEl.tagName === "VIDEO") mediaEl.pause();
                        mediaEl.remove();
                        mediaEl = null;
                    }
                    if (orig) {
                        items = orig;
                        orig = null;
                    }
                }
                function refresh() {
                    if (!items.length) return;
                    const it = items[idx];
                    if (mediaEl) {
                        mediaEl.remove();
                        mediaEl = null;
                    }
                    const lb = document.getElementById("lb");
                    if (it.type === "video" && it.url) {
                        mediaEl = document.createElement("video");
                        mediaEl.className = "lb-media";
                        mediaEl.src = it.url;
                        mediaEl.controls = true;
                        mediaEl.autoplay = true;
                    } else {
                        mediaEl = document.createElement("img");
                        mediaEl.className = "lb-media";
                        if (it.url) mediaEl.src = it.url;
                        else {
                            const cv = document.createElement("canvas");
                            cv.width = 800;
                            cv.height = 500;
                            const cx = cv.getContext("2d");
                            cx.fillStyle = `hsl(${120 + idx * 30},30%,25%)`;
                            cx.fillRect(0, 0, 800, 500);
                            cx.font = "40px serif";
                            cx.textAlign = "center";
                            cx.fillText("📷", 400, 230);
                            cx.fillStyle = "rgba(255,255,255,.3)";
                            cx.font = "14px sans-serif";
                            cx.fillText(
                                it.label || `Image ${idx + 1}`,
                                400,
                                280,
                            );
                            mediaEl.src = cv.toDataURL();
                        }
                    }
                    lb.insertBefore(
                        mediaEl,
                        document.getElementById("lb-dots"),
                    );
                    document.getElementById("lb-cnt").textContent =
                        `${idx + 1} / ${items.length}`;
                    document.getElementById("lb-type").textContent =
                        it.type === "video" ? "🎬 Video" : "📷 Photo";
                    const dots = document.getElementById("lb-dots");
                    dots.innerHTML = "";
                    for (let i = 0; i < items.length; i++) {
                        const d = document.createElement("button");
                        d.className = "lb-dot" + (i === idx ? " on" : "");
                        d.onclick = () => {
                            idx = i;
                            refresh();
                        };
                        dots.appendChild(d);
                    }
                }
                function nav(dir) {
                    if (!items.length) return;
                    idx = (idx + dir + items.length) % items.length;
                    refresh();
                }
                function openCustom(mi, si) {
                    orig = items;
                    items = mi;
                    idx = si || 0;
                    document.getElementById("lb").classList.add("open");
                    refresh();
                }
                return { init, open, close, nav, openCustom };
            })();

            // ═══════════════════════════════════════════════
            // PANORAMA
            // ═══════════════════════════════════════════════
            const Panorama = (() => {
                let pS,
                    pC,
                    pR,
                    pCtrl,
                    active = false;
                function init2() {
                    const cv = document.getElementById("pano-can");
                    pR = new THREE.WebGLRenderer({
                        canvas: cv,
                        antialias: true,
                    });
                    pR.setPixelRatio(Math.min(devicePixelRatio, 2));
                    pS = new THREE.Scene();
                    pC = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
                    pC.position.set(0, 0, 0.1);
                    pCtrl = new OrbitControls(pC, cv);
                    pCtrl.enableZoom = true;
                    pCtrl.enablePan = false;
                    pCtrl.rotateSpeed = -0.3;
                    pCtrl.enableDamping = true;
                    pCtrl.dampingFactor = 0.1;
                }
                function open(url, title) {
                    if (!pR) init2();
                    active = true;
                    document.getElementById("pano").classList.add("open");
                    document.getElementById("pano-ti").textContent =
                        title || "Panorama";
                    const el = document.getElementById("pano");
                    pR.setSize(el.clientWidth, el.clientHeight);
                    pC.aspect = el.clientWidth / el.clientHeight;
                    pC.updateProjectionMatrix();
                    new THREE.TextureLoader().load(url, (tex) => {
                        tex.colorSpace = THREE.SRGBColorSpace;
                        const geo = new THREE.SphereGeometry(50, 60, 40);
                        geo.scale(-1, 1, 1);
                        pS.children.forEach((c) => {
                            pS.remove(c);
                            c.geometry?.dispose();
                            c.material?.dispose();
                        });
                        pS.add(
                            new THREE.Mesh(
                                geo,
                                new THREE.MeshBasicMaterial({ map: tex }),
                            ),
                        );
                    });
                    (function r() {
                        if (!active) return;
                        requestAnimationFrame(r);
                        pCtrl.update();
                        pR.render(pS, pC);
                    })();
                    const onR = () => {
                        if (!active) return;
                        pR.setSize(el.clientWidth, el.clientHeight);
                        pC.aspect = el.clientWidth / el.clientHeight;
                        pC.updateProjectionMatrix();
                    };
                    addEventListener("resize", onR);
                    el._onR = onR;
                }
                function close() {
                    active = false;
                    document.getElementById("pano").classList.remove("open");
                    const el = document.getElementById("pano");
                    if (el._onR) removeEventListener("resize", el._onR);
                }
                return { open, close };
            })();

            // ═══════════════════════════════════════════════
            // FLOOR PLAN
            // ═══════════════════════════════════════════════
            const FloorPlan = (() => {
                let floor = 3,
                    view = "2d",
                    fp3dScene,
                    fp3dCamera,
                    fp3dRenderer,
                    fp3dControls,
                    fp3dActive = false;

                function open(f) {
                    floor = f || 3;
                    view = "2d";
                    document.getElementById("fp").classList.add("open");
                    document.getElementById("fp-2d").classList.add("on");
                    document.getElementById("fp-3d").classList.remove("on");
                    showView();
                }
                function close() {
                    document.getElementById("fp").classList.remove("open");
                    fp3dActive = false;
                }

                function showView() {
                    const can = document.getElementById("fp-can");
                    if (view === "2d") {
                        can.style.display = "block";
                        const old = document
                            .getElementById("fp-view")
                            .querySelector(".fp3dc");
                        if (old) old.style.display = "none";
                        fp3dActive = false;
                        draw2D();
                    } else {
                        can.style.display = "none";
                        init3D();
                    }
                }

                function draw2D() {
                    const can = document.getElementById("fp-can"),
                        ctx = can.getContext("2d");
                    const units = TD.units.filter((u) => u.floor === floor);
                    const cont = document.getElementById("fp-view");
                    can.width = cont.clientWidth || 600;
                    can.height = cont.clientHeight || 380;
                    const W = can.width,
                        H = can.height;
                    const sc = TD.statusColors || {};

                    document.getElementById("fp-fl").textContent =
                        `Floor ${floor}`;
                    document.getElementById("fp-uc").textContent =
                        `${units.length} unit${units.length !== 1 ? "s" : ""}`;

                    ctx.fillStyle =
                        getComputedStyle(document.documentElement)
                            .getPropertyValue("--c-card2")
                            .trim() || "#f9fafb";
                    ctx.fillRect(0, 0, W, H);
                    ctx.strokeStyle = "rgba(128,128,128,.05)";
                    ctx.lineWidth = 1;
                    for (let x = 0; x < W; x += 25) {
                        ctx.beginPath();
                        ctx.moveTo(x, 0);
                        ctx.lineTo(x, H);
                        ctx.stroke();
                    }
                    for (let y = 0; y < H; y += 25) {
                        ctx.beginPath();
                        ctx.moveTo(0, y);
                        ctx.lineTo(W, y);
                        ctx.stroke();
                    }

                    if (!units.length) {
                        ctx.fillStyle = "#888";
                        ctx.font = "14px sans-serif";
                        ctx.textAlign = "center";
                        ctx.fillText("No units on this floor", W / 2, H / 2);
                        return;
                    }

                    const bbs = units
                        .map((u) => {
                            if (u._meshBBox)
                                return {
                                    u,
                                    mnX: u._meshBBox.min.x,
                                    mxX: u._meshBBox.max.x,
                                    mnZ: u._meshBBox.min.z,
                                    mxZ: u._meshBBox.max.z,
                                };
                            if (u.bbox)
                                return {
                                    u,
                                    mnX: u.bbox.min[0],
                                    mxX: u.bbox.max[0],
                                    mnZ: u.bbox.min[2],
                                    mxZ: u.bbox.max[2],
                                };
                            return null;
                        })
                        .filter(Boolean);
                    if (!bbs.length) return;

                    const aMnX = Math.min(...bbs.map((b) => b.mnX)),
                        aMxX = Math.max(...bbs.map((b) => b.mxX));
                    const aMnZ = Math.min(...bbs.map((b) => b.mnZ)),
                        aMxZ = Math.max(...bbs.map((b) => b.mxZ));
                    const rX = aMxX - aMnX || 1,
                        rZ = aMxZ - aMnZ || 1;
                    const pad = 45,
                        scale = Math.min(
                            (W - pad * 2) / rX,
                            (H - pad * 2) / rZ,
                            60,
                        );
                    const oX = W / 2,
                        oZ = H / 2,
                        cX = (aMnX + aMxX) / 2,
                        cZ = (aMnZ + aMxZ) / 2;

                    bbs.forEach(({ u, mnX, mxX, mnZ, mxZ }) => {
                        const x1 = oX + (mnX - cX) * scale,
                            z1 = oZ + (mnZ - cZ) * scale,
                            x2 = oX + (mxX - cX) * scale,
                            z2 = oZ + (mxZ - cZ) * scale;
                        const ux = Math.min(x1, x2),
                            uz = Math.min(z1, z2),
                            uw = Math.abs(x2 - x1) || 50,
                            uh = Math.abs(z2 - z1) || 35;
                        const col = sc[u.status] || "#22c55e";

                        ctx.fillStyle = col + "22";
                        ctx.beginPath();
                        if (ctx.roundRect) ctx.roundRect(ux, uz, uw, uh, 3);
                        else ctx.rect(ux, uz, uw, uh);
                        ctx.fill();
                        ctx.strokeStyle = col;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        ctx.fillStyle = col;
                        ctx.fillRect(ux + uw / 2 - 6, uz + uh - 2, 12, 2);

                        const tc =
                            getComputedStyle(document.documentElement)
                                .getPropertyValue("--c-t1")
                                .trim() || "#333";
                        ctx.fillStyle = tc;
                        ctx.font = "bold 10px sans-serif";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.fillText(
                            u.unitNumber || u.name,
                            ux + uw / 2,
                            uz + uh / 2 - 8,
                        );
                        ctx.font = "8px sans-serif";
                        ctx.fillStyle = col;
                        ctx.fillText(
                            `${u.areaBreakdown ? u.areaBreakdown.total : u.area}m² · ${u.type}`,
                            ux + uw / 2,
                            uz + uh / 2 + 4,
                        );
                        ctx.beginPath();
                        ctx.arc(ux + 8, uz + 8, 3, 0, Math.PI * 2);
                        ctx.fillStyle = col;
                        ctx.fill();
                    });

                    ctx.fillStyle =
                        getComputedStyle(document.documentElement)
                            .getPropertyValue("--c-t3")
                            .trim() || "#888";
                    ctx.font = "10px sans-serif";
                    ctx.textAlign = "left";
                    ctx.textBaseline = "top";
                    ctx.fillText(
                        `Floor ${floor} — ${units.length} units`,
                        10,
                        10,
                    );
                }

                function init3D() {
                    const cont = document.getElementById("fp-view");
                    let cv = cont.querySelector(".fp3dc");
                    if (!cv) {
                        cv = document.createElement("canvas");
                        cv.className = "fp3dc";
                        cv.style.cssText =
                            "width:100%;height:100%;display:block";
                        cont.appendChild(cv);
                    }
                    cv.style.display = "block";
                    const W = cont.clientWidth,
                        H = cont.clientHeight;
                    if (!fp3dRenderer) {
                        fp3dRenderer = new THREE.WebGLRenderer({
                            canvas: cv,
                            antialias: true,
                            alpha: true,
                        });
                        fp3dRenderer.shadowMap.enabled = true;
                        fp3dRenderer.toneMapping = THREE.ACESFilmicToneMapping;
                        fp3dRenderer.outputColorSpace = THREE.SRGBColorSpace;
                    }
                    fp3dRenderer.setSize(W, H);
                    fp3dRenderer.setPixelRatio(Math.min(devicePixelRatio, 2));

                    fp3dScene = new THREE.Scene();
                    fp3dScene.background = new THREE.Color(
                        getComputedStyle(document.documentElement)
                            .getPropertyValue("--c-card2")
                            .trim() || "#f9fafb",
                    );
                    fp3dCamera = new THREE.PerspectiveCamera(
                        45,
                        W / H,
                        0.1,
                        200,
                    );
                    fp3dCamera.position.set(12, 15, 12);
                    fp3dControls = new OrbitControls(fp3dCamera, cv);
                    fp3dControls.enableDamping = true;
                    fp3dControls.dampingFactor = 0.08;
                    fp3dScene.add(new THREE.AmbientLight(0xffffff, 0.6));
                    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
                    sun.position.set(5, 15, 5);
                    sun.castShadow = true;
                    fp3dScene.add(sun);

                    build3DFloor();
                    fp3dActive = true;
                    (function r() {
                        if (!fp3dActive) return;
                        requestAnimationFrame(r);
                        fp3dControls.update();
                        fp3dRenderer.render(fp3dScene, fp3dCamera);
                    })();
                }

                function build3DFloor() {
                    const units = TD.units.filter((u) => u.floor === floor);
                    const sc = TD.statusColors || {};
                    const slab = new THREE.Mesh(
                        new THREE.BoxGeometry(18, 0.12, 12),
                        new THREE.MeshStandardMaterial({
                            color: 0xdddddd,
                            roughness: 0.8,
                        }),
                    );
                    slab.position.y = -0.06;
                    slab.receiveShadow = true;
                    fp3dScene.add(slab);
                    if (!units.length) return;
                    const bbs = units
                        .map((u) => {
                            if (u.bbox)
                                return {
                                    u,
                                    mnX: u.bbox.min[0],
                                    mxX: u.bbox.max[0],
                                    mnZ: u.bbox.min[2],
                                    mxZ: u.bbox.max[2],
                                };
                            if (u._meshBBox)
                                return {
                                    u,
                                    mnX: u._meshBBox.min.x,
                                    mxX: u._meshBBox.max.x,
                                    mnZ: u._meshBBox.min.z,
                                    mxZ: u._meshBBox.max.z,
                                };
                            return null;
                        })
                        .filter(Boolean);
                    if (!bbs.length) return;
                    const cX =
                        (Math.min(...bbs.map((b) => b.mnX)) +
                            Math.max(...bbs.map((b) => b.mxX))) /
                        2;
                    const cZ =
                        (Math.min(...bbs.map((b) => b.mnZ)) +
                            Math.max(...bbs.map((b) => b.mxZ))) /
                        2;

                    bbs.forEach(({ u, mnX, mxX, mnZ, mxZ }) => {
                        const w = Math.abs(mxX - mnX) || 2,
                            d = Math.abs(mxZ - mnZ) || 2,
                            wH = 2.6;
                        const col = new THREE.Color(sc[u.status] || "#22c55e");
                        const fl = new THREE.Mesh(
                            new THREE.BoxGeometry(w, 0.02, d),
                            new THREE.MeshStandardMaterial({
                                color: col,
                                transparent: true,
                                opacity: 0.2,
                            }),
                        );
                        fl.position.set(
                            (mnX + mxX) / 2 - cX,
                            0.01,
                            (mnZ + mxZ) / 2 - cZ,
                        );
                        fp3dScene.add(fl);
                        const wm = new THREE.MeshStandardMaterial({
                            color: 0xcccccc,
                            transparent: true,
                            opacity: 0.55,
                        });
                        [
                            {
                                p: [(mnX + mxX) / 2 - cX, wH / 2, mnZ - cZ],
                                s: [w, wH, 0.06],
                            },
                            {
                                p: [(mnX + mxX) / 2 - cX, wH / 2, mxZ - cZ],
                                s: [w, wH, 0.06],
                            },
                            {
                                p: [mnX - cX, wH / 2, (mnZ + mxZ) / 2 - cZ],
                                s: [0.06, wH, d],
                            },
                            {
                                p: [mxX - cX, wH / 2, (mnZ + mxZ) / 2 - cZ],
                                s: [0.06, wH, d],
                            },
                        ].forEach((wl) => {
                            const m = new THREE.Mesh(
                                new THREE.BoxGeometry(...wl.s),
                                wm.clone(),
                            );
                            m.position.set(...wl.p);
                            m.castShadow = true;
                            fp3dScene.add(m);
                        });
                        const edge = new THREE.Mesh(
                            new THREE.BoxGeometry(w + 0.08, 0.04, d + 0.08),
                            new THREE.MeshBasicMaterial({ color: col }),
                        );
                        edge.position.set(
                            (mnX + mxX) / 2 - cX,
                            wH,
                            (mnZ + mxZ) / 2 - cZ,
                        );
                        fp3dScene.add(edge);

                        // Label
                        const cv = document.createElement("canvas");
                        cv.width = 256;
                        cv.height = 64;
                        const cx = cv.getContext("2d");
                        cx.fillStyle = "rgba(0,0,0,.55)";
                        cx.beginPath();
                        if (cx.roundRect) cx.roundRect(4, 4, 248, 56, 10);
                        else cx.rect(4, 4, 248, 56);
                        cx.fill();
                        cx.fillStyle = "#fff";
                        cx.font = "bold 22px sans-serif";
                        cx.textAlign = "center";
                        cx.textBaseline = "middle";
                        cx.fillText(u.unitNumber || u.name, 128, 32);
                        const tex = new THREE.CanvasTexture(cv);
                        const sp = new THREE.Sprite(
                            new THREE.SpriteMaterial({
                                map: tex,
                                transparent: true,
                            }),
                        );
                        sp.scale.set(1.8, 0.45, 1);
                        sp.position.set(
                            (mnX + mxX) / 2 - cX,
                            wH + 0.5,
                            (mnZ + mxZ) / 2 - cZ,
                        );
                        fp3dScene.add(sp);
                    });
                }

                function navFloor(dir) {
                    const floors = [
                        ...new Set(TD.units.map((u) => u.floor)),
                    ].sort((a, b) => a - b);
                    if (!floors.length) return;
                    const i = floors.indexOf(floor);
                    floor = floors[(i + dir + floors.length) % floors.length];
                    if (view === "2d") draw2D();
                    else {
                        if (fp3dScene) {
                            while (fp3dScene.children.length)
                                fp3dScene.remove(fp3dScene.children[0]);
                            fp3dScene.add(
                                new THREE.AmbientLight(0xffffff, 0.6),
                            );
                            const s = new THREE.DirectionalLight(0xffffff, 1.2);
                            s.position.set(5, 15, 5);
                            s.castShadow = true;
                            fp3dScene.add(s);
                            build3DFloor();
                        }
                    }
                }

                function setView(v) {
                    view = v;
                    document
                        .getElementById("fp-2d")
                        .classList.toggle("on", v === "2d");
                    document
                        .getElementById("fp-3d")
                        .classList.toggle("on", v === "3d");
                    showView();
                }

                return { open, close, navFloor, setView };
            })();

            // ═══════════════════════════════════════════════
            // UI
            // ═══════════════════════════════════════════════
            const UI = (() => {
                let dark = localStorage.getItem("dark") === "1";

                function init() {
                    if (dark) applyDark(true);
                    wireAll();
                }
                function applyDark(on) {
                    dark = on;
                    document.documentElement.setAttribute(
                        "data-theme",
                        on ? "dark" : "",
                    );
                    localStorage.setItem("dark", on ? "1" : "0");
                    const b = document.getElementById("t-dk");
                    b.textContent = on ? "☀️" : "🌙";
                    b.classList.toggle("on", on);
                }

                function wireAll() {
                    document.getElementById("d-hdr").onclick = () => {
                        document
                            .getElementById("detail")
                            .classList.toggle("shut");
                        document.getElementById("d-tog").textContent = document
                            .getElementById("detail")
                            .classList.contains("shut")
                            ? "+"
                            : "−";
                    };
                    document.getElementById("s-hdr").onclick = () => {
                        document
                            .getElementById("search")
                            .classList.toggle("shut");
                        document.getElementById("s-tog").textContent = document
                            .getElementById("search")
                            .classList.contains("shut")
                            ? "+"
                            : "−";
                    };
                    document.getElementById("q").oninput =
                        Search.debounceFilter;
                    document.getElementById("sbtn").onclick = Search.filter;
                    document.getElementById("rbtn").onclick = Search.reset;
                    ["fT", "fS", "fF"].forEach(
                        (id) =>
                            (document.getElementById(id).onchange =
                                Search.filter),
                    );
                    document.getElementById("t-dk").onclick = () =>
                        applyDark(!dark);
                    document.getElementById("t-zi").onclick = () =>
                        Engine.zoom(1);
                    document.getElementById("t-zo").onclick = () =>
                        Engine.zoom(-1);
                    document.getElementById("t-rs").onclick = () => {
                        Engine.resetView();
                        Units.deselect();
                        Hotspots.clear();
                        resetDetail();
                        Search.highlight(null);
                    };
                    document.getElementById("t-fs").onclick = () => {
                        try {
                            document.fullscreenElement
                                ? document.exitFullscreen()
                                : document.documentElement.requestFullscreen();
                        } catch (e) {}
                    };
                    document.getElementById("lb-x").onclick = Gallery.close;
                    document.getElementById("lb-p").onclick = () =>
                        Gallery.nav(-1);
                    document.getElementById("lb-nx").onclick = () =>
                        Gallery.nav(1);
                    document.getElementById("lb").onclick = (e) => {
                        if (e.target.id === "lb") Gallery.close();
                    };
                    document.getElementById("open-pd").onclick = () =>
                        document.getElementById("pd").classList.add("open");
                    document.getElementById("pd-cl").onclick = () =>
                        document.getElementById("pd").classList.remove("open");
                    document.getElementById("pd").onclick = (e) => {
                        if (e.target.id === "pd")
                            document
                                .getElementById("pd")
                                .classList.remove("open");
                    };
                    document.getElementById("fp-cl").onclick = FloorPlan.close;
                    document.getElementById("fp").onclick = (e) => {
                        if (e.target.id === "fp") FloorPlan.close();
                    };
                    document.getElementById("fp-pv").onclick = () =>
                        FloorPlan.navFloor(-1);
                    document.getElementById("fp-nx").onclick = () =>
                        FloorPlan.navFloor(1);
                    document.getElementById("fp-2d").onclick = () =>
                        FloorPlan.setView("2d");
                    document.getElementById("fp-3d").onclick = () =>
                        FloorPlan.setView("3d");
                    document.getElementById("pano-x").onclick = Panorama.close;
                    document.getElementById("fp2d-x").onclick = () =>
                        document
                            .getElementById("fp2d-modal")
                            .classList.remove("open");
                    document.getElementById("fp2d-modal").onclick = (e) => {
                        if (e.target.id === "fp2d-modal")
                            document
                                .getElementById("fp2d-modal")
                                .classList.remove("open");
                    };
                    addEventListener("keydown", (e) => {
                        if (e.key === "Escape") {
                            Gallery.close();
                            document
                                .getElementById("pd")
                                .classList.remove("open");
                            FloorPlan.close();
                            Panorama.close();
                            document
                                .getElementById("fp2d-modal")
                                .classList.remove("open");
                        }
                        if (
                            document
                                .getElementById("lb")
                                .classList.contains("open")
                        ) {
                            if (e.key === "ArrowLeft") Gallery.nav(-1);
                            if (e.key === "ArrowRight") Gallery.nav(1);
                        }
                    });
                }

                function populateProject() {
                    document.getElementById("h-name").textContent =
                        TD.projectName || "Tour";
                    // Logo
                    if (TD.media?.developerLogo) {
                        document.getElementById("h-logo").innerHTML =
                            `<img src="${TD.media.developerLogo}" alt="logo">`;
                        document.getElementById("pd-logo").innerHTML =
                            `<img src="${TD.media.developerLogo}" alt="logo" style="width:100%;height:100%;object-fit:cover">`;
                    }
                    document.getElementById("pd-ti").textContent =
                        TD.projectName;

                    // Hero in detail panel
                    const hero = document.getElementById("d-hero");
                    if (TD.media?.heroVideo) {
                        hero.innerHTML = `<video src="${TD.media.heroVideo}" autoplay muted loop playsinline></video>`;
                    } else if (TD.media?.heroImage) {
                        hero.innerHTML = `<img src="${TD.media.heroImage}" alt="">`;
                    }
                    document.getElementById("d-desc").textContent =
                        TD.projectDescription || "";

                    // Project details modal
                    const pd = TD.projectDetails || {};
                    const coords = TD.coordinates || { lat: 0, lng: 0 };
                    let html = `<p>${TD.projectDescription || ""}</p>`;

                    // Details grid
                    const details = [
                        { l: "Location", v: pd.location },
                        { l: "Building Type", v: pd.buildingType },
                        { l: "Structure", v: pd.buildingSize },
                        {
                            l: "Lot Size",
                            v: pd.lotSize ? pd.lotSize + " m²" : null,
                        },
                        { l: "Delivery", v: pd.deliveryTime },
                        { l: "Parking", v: pd.parkingType },
                        { l: "Total Floors", v: pd.totalFloors },
                        { l: "Units/Floor", v: pd.unitsPerFloor },
                        { l: "Total Units", v: pd.totalUnits },
                        { l: "Basement", v: pd.basement ? "Yes" : "No" },
                    ].filter((d) => d.v);
                    if (details.length) {
                        html += `<div class="pd-section"><div class="pd-section-title">🏗️ Building Details</div><div class="pd-detail-grid">${details.map((d) => `<div class="pd-detail"><small>${d.l}</small><b>${d.v}</b></div>`).join("")}</div></div>`;
                    }

                    // Features
                    if (TD.features?.length) {
                        html += `<div class="pd-section"><div class="pd-section-title">✨ Features</div><div class="pd-feats">${TD.features.map((f) => `<div class="pd-f"><span class="fi">${f.icon}</span><span class="ft">${f.text}</span></div>`).join("")}</div></div>`;
                    }

                    // Amenities
                    if (TD.amenities?.length) {
                        html += `<div class="pd-section"><div class="pd-section-title">🏠 Amenities</div><div class="pd-amenities">${TD.amenities.map((a) => `<span class="pd-am">${a.icon} ${a.name}</span>`).join("")}</div></div>`;
                    }

                    // Nearby
                    if (TD.nearbyAttractions?.length) {
                        html += `<div class="pd-section"><div class="pd-section-title">📍 Nearby</div><div class="pd-nearby">${TD.nearbyAttractions
                            .slice(0, 8)
                            .map(
                                (n) =>
                                    `<div class="pd-nr"><span class="nr-name">${n.icon || ""} ${n.name}</span><span class="nr-dist">${n.distance}</span></div>`,
                            )
                            .join("")}</div></div>`;
                    }

                    // Map
                    if (coords.lat && coords.lng) {
                        html += `<div class="pd-map"><iframe src="https://maps.google.com/maps?q=${coords.lat},${coords.lng}&z=15&output=embed" loading="lazy" title="Map"></iframe></div><a class="pd-ml" href="https://maps.google.com/maps?q=${coords.lat},${coords.lng}" target="_blank" rel="noopener">📍 Open in Google Maps</a>`;
                    }

                    document.getElementById("pd-b").innerHTML = html;

                    // Loader branding
                    if (TD.media?.developerLogo) {
                        const lLogo = document.getElementById("l-logo");
                        lLogo.outerHTML = `<img class="logo-img" src="${TD.media.developerLogo}" alt="logo">`;
                    }
                    document.getElementById("l-name").textContent =
                        TD.projectName || "Tour";
                }

                function expandDetail() {
                    document.getElementById("detail").classList.remove("shut");
                    document.getElementById("d-tog").textContent = "−";
                }

                function showUnitCard(unit) {
                    document.getElementById("d-def").style.display = "none";
                    const d = document.getElementById("d-dyn");
                    const bc =
                        unit.status === "Available"
                            ? "b-ok"
                            : unit.status === "Reserved"
                              ? "b-warn"
                              : "b-err";
                    const media = collectMedia(unit);
                    const typeInfo = TD.unitTypes?.[unit.unitType];

                    // Carousel
                    let car;
                    if (media.length) {
                        const f = media[0];
                        const tag =
                            f.type === "video"
                                ? `<video src="${f.url}" muted autoplay loop playsinline></video>`
                                : `<img src="${f.url}" alt="">`;
                        car = `<div class="u-carousel" id="u-car">${tag}${media.length > 1 ? `<button class="cb p" id="cp">◀</button><button class="cb n" id="cn">▶</button><div class="cdots" id="cdots">${media.map((_, i) => `<button class="cdot${i === 0 ? " on" : ""}" data-i="${i}"></button>`).join("")}</div>` : ""}
      <div class="mc">${media.length > 1 ? `1/${media.length}` : f.type === "video" ? "🎬" : "📷"}</div></div>`;
                    } else
                        car =
                            '<div class="u-carousel" style="display:flex;align-items:center;justify-content:center;font-size:36px;color:rgba(255,255,255,.4)">🏠</div>';

                    // Actions
                    let acts = `<button class="u-btn u-btn-p" id="uc-fp">📐 Floor Plan</button>`;
                    if (unit.floorPlan)
                        acts += `<button class="u-btn u-btn-s" id="uc-fp2d">📄 2D Plan</button>`;
                    if (unit.panorama)
                        acts += `<button class="u-btn u-btn-s" id="uc-pano">🔄 Panorama</button>`;
                    if (media.length)
                        acts += `<button class="u-btn u-btn-s" id="uc-gal">📷 ${media.length}</button>`;

                    // Functional areas
                    let faHTML = "";
                    const fas =
                        unit.functionalAreas || typeInfo?.functionalAreas;
                    if (fas?.length) {
                        faHTML = `<div class="fa-section"><div class="fa-title">Room Breakdown</div><div class="fa-list">${fas.map((f) => `<div class="fa-row"><span class="fa-name">${f.name}</span><span class="fa-area">${f.area} m²</span></div>`).join("")}</div></div>`;
                    }

                    // Area breakdown
                    let abHTML = "";
                    const ab = unit.areaBreakdown;
                    if (ab) {
                        abHTML = `<div class="u-area-breakdown"><div class="u-ab"><small>Net</small><b>${ab.net}m²</b></div><div class="u-ab"><small>Common</small><b>${ab.common}m²</b></div><div class="u-ab"><small>Total</small><b>${ab.total}m²</b></div></div>`;
                    }

                    d.innerHTML = `<div class="u-card">${car}
      <div class="u-head"><span class="u-name">${unit.name}</span><span class="badge ${bc}">${unit.status}</span></div>
      ${typeInfo ? `<div class="u-type-label">${typeInfo.label || unit.unitType} · ${unit.bedrooms || typeInfo.bedrooms} Bed · ${unit.bathrooms || typeInfo.bathrooms} Bath</div>` : ""}
      <div class="u-stats">
        <div class="u-st"><small>Type</small><b>${unit.type}</b></div>
        <div class="u-st"><small>Floor</small><b>${unit.floor}</b></div>
        <div class="u-st"><small>Area</small><b>${ab ? ab.total : unit.area}m²</b></div>
        <div class="u-st"><small>Price</small><b class="pr">${unit.priceFormatted || "$" + (unit.price?.toLocaleString() || "TBD")}</b></div>
      </div>
      ${abHTML}
      <div class="u-desc">${unit.description || ""}</div>
      ${unit.features?.length ? `<div class="u-feats">${unit.features.map((f) => `<span class="u-feat">${f}</span>`).join("")}</div>` : ""}
      ${faHTML}
      <div class="u-actions">${acts}</div>
    </div>`;

                    // Wire carousel
                    if (media.length > 1) {
                        let ci = 0;
                        const upd = () => {
                            const car2 = document.getElementById("u-car");
                            if (!car2) return;
                            const m = media[ci];
                            const old = car2.querySelector("img,video");
                            let ne;
                            if (m.type === "video") {
                                ne = document.createElement("video");
                                ne.src = m.url;
                                ne.muted = true;
                                ne.autoplay = true;
                                ne.loop = true;
                                ne.playsInline = true;
                            } else {
                                ne = document.createElement("img");
                                ne.src = m.url;
                            }
                            if (old) old.replaceWith(ne);
                            car2.querySelector(".mc").textContent =
                                `${ci + 1}/${media.length}`;
                            car2.querySelectorAll(".cdot").forEach((dot, i) =>
                                dot.classList.toggle("on", i === ci),
                            );
                        };
                        d.querySelector("#cp")?.addEventListener(
                            "click",
                            () => {
                                ci = (ci - 1 + media.length) % media.length;
                                upd();
                            },
                        );
                        d.querySelector("#cn")?.addEventListener(
                            "click",
                            () => {
                                ci = (ci + 1) % media.length;
                                upd();
                            },
                        );
                        d.querySelectorAll(".cdot").forEach((dot) =>
                            dot.addEventListener("click", () => {
                                ci = parseInt(dot.dataset.i);
                                upd();
                            }),
                        );
                    }

                    d.querySelector("#uc-fp")?.addEventListener("click", () =>
                        FloorPlan.open(unit.floor),
                    );
                    d.querySelector("#uc-fp2d")?.addEventListener(
                        "click",
                        () => {
                            document.getElementById("fp2d-img").src =
                                unit.floorPlan;
                            document
                                .getElementById("fp2d-modal")
                                .classList.add("open");
                        },
                    );
                    d.querySelector("#uc-pano")?.addEventListener("click", () =>
                        Panorama.open(unit.panorama, unit.name),
                    );
                    d.querySelector("#uc-gal")?.addEventListener("click", () =>
                        Gallery.openCustom(media, 0),
                    );
                }

                function collectMedia(unit) {
                    const m = [];
                    const isV = (u) => {
                        if (!u) return false;
                        const e = u.split(".").pop().toLowerCase();
                        return ["mp4", "webm", "mov", "ogg"].includes(e);
                    };
                    if (unit.image && !m.find((x) => x.url === unit.image))
                        m.push({
                            url: unit.image,
                            type: isV(unit.image) ? "video" : "image",
                            label: unit.name,
                        });
                    if (unit.images)
                        unit.images.forEach((img, i) => {
                            const url = typeof img === "string" ? img : img.url;
                            if (url && !m.find((x) => x.url === url))
                                m.push({
                                    url,
                                    type: isV(url) ? "video" : "image",
                                    label: `${unit.name} ${i + 1}`,
                                });
                        });
                    if (unit.videos)
                        unit.videos.forEach((v) => {
                            const url = typeof v === "string" ? v : v.url;
                            if (url)
                                m.push({ url, type: "video", label: "Video" });
                        });
                    return m;
                }

                function showHotspotCard(h) {
                    document.getElementById("d-def").style.display = "none";
                    const d = document.getElementById("d-dyn");
                    const media = [];
                    if (h.images)
                        h.images.forEach((img) => {
                            const url = typeof img === "string" ? img : img.url;
                            if (url)
                                media.push({
                                    url,
                                    type: "image",
                                    label: h.label,
                                });
                        });
                    if (h.videos)
                        h.videos.forEach((v) => {
                            const url = typeof v === "string" ? v : v.url;
                            if (url)
                                media.push({
                                    url,
                                    type: "video",
                                    label: h.label,
                                });
                        });
                    let mHTML = "";
                    if (media.length) {
                        const f = media[0];
                        mHTML = `<div class="u-carousel">${f.type === "video" ? `<video src="${f.url}" controls muted autoplay></video>` : `<img src="${f.url}" alt="">`}</div>`;
                    }
                    d.innerHTML = `<div class="hs-card">${mHTML}<div class="hs-head"><div class="hs-ic" style="background:${h.color}">${h.icon}</div><span class="hs-ti">${h.label}</span></div><div class="u-desc">${h.description || ""}</div>
    ${media.length > 1 ? `<button class="u-btn u-btn-s" style="margin-top:6px;width:100%" id="hs-gal">📷 View All (${media.length})</button>` : ""}</div>`;
                    d.querySelector("#hs-gal")?.addEventListener("click", () =>
                        Gallery.openCustom(media, 0),
                    );
                }

                function resetDetail() {
                    document.getElementById("d-def").style.display = "";
                    document.getElementById("d-dyn").innerHTML = "";
                }

                return {
                    init,
                    expandDetail,
                    showUnitCard,
                    showHotspotCard,
                    resetDetail,
                    populateProject,
                };
            })();

            // ═══════════════════════════════════════════════
            // BOOT
            // ═══════════════════════════════════════════════
            async function boot() {
                Engine.init();
                try {
                    TD = await Loader.loadJSON(CFG.dataPath);
                } catch (e) {
                    console.warn("No tour-data.json");
                    TD = {
                        projectName: "Demo Tour",
                        units: [],
                        hotspots: [],
                        gallery: [],
                    };
                }
                TD.units = TD.units || [];
                TD.hotspots = TD.hotspots || [];
                TD.gallery = TD.gallery || [];
                TD.units.forEach((u) => {
                    u.id = u.id || u.unitNumber || u.name;
                    u.description = u.description || u.desc || "";
                    u.features = u.features || u.feats || [];
                });

                Engine.configure(TD);

                if (TD.hdri) {
                    try {
                        Engine.setEnv(await Loader.loadHDRI(TD.hdri));
                    } catch (e) {
                        Engine.setFallbackBg();
                    }
                } else Engine.setFallbackBg();
                if (TD.modelFile) {
                    try {
                        Model.loadBuilding(
                            await Loader.loadGLB(TD.modelFile, "Building"),
                        );
                    } catch (e) {
                        Model.buildFallback();
                    }
                } else Model.buildFallback();

                const urls = new Set();
                TD.gallery.forEach((g) => {
                    if (g.url) urls.add(g.url);
                });
                TD.units.forEach((u) => {
                    if (u.image) urls.add(u.image);
                    if (u.images)
                        u.images.forEach((img) => {
                            const url = typeof img === "string" ? img : img.url;
                            if (url) urls.add(url);
                        });
                });
                if (urls.size)
                    await Loader.preloadImages([...urls].slice(0, 20)); // cap at 20 for speed

                Units.build();
                Hotspots.build();
                Search.init();
                Gallery.init();
                UI.init();
                UI.populateProject();
                Loader.finish();
                document.getElementById("lbtn").onclick = () =>
                    document.getElementById("loader").classList.add("done");
                setTimeout(
                    () =>
                        document.getElementById("loader").classList.add("done"),
                    3500,
                );
                document
                    .getElementById("c")
                    .addEventListener("click", Units.onClick);
                let frame = 0;
                (function loop() {
                    requestAnimationFrame(loop);
                    frame++;
                    Engine.render();
                    if (frame % 2 === 0) Hotspots.update();
                })();
            }

            boot();
        </script>
    </body>
</html>
