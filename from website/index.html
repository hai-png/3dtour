<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Skyline Residences — 3D Tour</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./viewer/style.css?v=8">
</head>
<body>
<div id="ld">
  <div class="ld-content">
    <div class="ld-logo">
      <div class="ld-logo-icon">🏢</div>
      <div class="ld-logo-text">
        <div class="ld-project-name" id="ld-project-name">Skyline Residences</div>
        <div class="ld-tagline">Luxury Living Redefined</div>
      </div>
    </div>
    <div class="ld-spin"></div>
    <div class="ld-txt">Loading 3D Tour...</div>
    <div class="ld-bar-wrap"><div class="ld-bar" id="ldb"></div></div>
    <button class="ld-details-btn" id="ld-details-btn">
      <span class="material-symbols-outlined">info</span>
      View Project Details
    </button>
  </div>
</div>

<div id="app">
  <!-- Canvas Container -->
  <div id="cw"></div>
  <div id="hl"></div>
  <div id="fh"><kbd>WASD</kbd> move · <kbd>Space</kbd>/<kbd>Shift</kbd> up/down · <kbd>Esc</kbd> exit</div>

  <!-- Header: Logo + Project Name (Top Left) -->
  <div id="header" class="header">
    <div class="header-logo">
      <div class="header-logo-icon">🏢</div>
      <div class="header-logo-text">
        <div class="header-project-name" id="header-project-name">Skyline Residences</div>
      </div>
    </div>
    <button class="header-details-btn" id="header-details-btn">
      <span class="material-symbols-outlined">info</span>
      <span>Project Details</span>
    </button>
  </div>

  <!-- Collapsed Gallery Widget (Bottom Center) -->
  <div id="gallery-widget" class="gallery-widget">
    <div class="gallery-widget-images">
      <div class="gallery-widget-img" id="gw-img-1"></div>
      <div class="gallery-widget-img" id="gw-img-2"></div>
      <div class="gallery-widget-img gallery-widget-count" id="gw-count">
        <span>+12</span>
      </div>
    </div>
    <div class="gallery-widget-info">
      <div class="gallery-widget-title">Project Gallery</div>
      <div class="gallery-widget-subtitle"><span id="gw-total">15</span> Photos & Videos</div>
    </div>
    <button class="gallery-widget-btn" id="gallery-widget-open">
      <span class="material-symbols-outlined">grid_view</span>
    </button>
  </div>

  <!-- Zone 3: Detail Cards (Right Side) -->
  <div id="z3" class="zone zone-r">
    <div class="zone-header">
      <span class="material-symbols-outlined zone-icon">apartment</span>
      <span class="zone-title">Details</span>
      <button class="zone-toggle" id="z3-toggle">−</button>
    </div>
    <div class="zone-content" id="z3-content">
      <!-- Dynamic content based on selection -->
      <div id="z3-dynamic"></div>
      <!-- Empty when no selection -->
    </div>
  </div>

  <!-- Zone 4: Unit Search (Bottom) -->
  <div id="z4" class="zone zone-b zone-collapsed">
    <div class="zone-header">
      <span class="material-symbols-outlined zone-icon">search</span>
      <span class="zone-title">Unit Search</span>
      <button class="zone-toggle" id="z4-toggle">+</button>
    </div>
    <div class="zone-content" id="z4-content">
      <div class="search-bar">
        <input type="text" class="search-input" id="z4-search" placeholder="Search units..."/>
        <button class="search-btn" id="z4-search-btn">
          <span class="material-symbols-outlined">search</span>
        </button>
        <button class="search-btn reset-btn" id="z4-reset" title="Reset Filters">
          <span class="material-symbols-outlined">refresh</span>
        </button>
      </div>
      <div class="search-filters">
        <select class="filter-select" id="z4-filter-type">
          <option value="">All Types</option>
          <option value="Studio">Studio</option>
          <option value="1BR">1 Bedroom</option>
          <option value="2BR">2 Bedrooms</option>
          <option value="3BR">3 Bedrooms</option>
          <option value="Penthouse">Penthouse</option>
        </select>
        <select class="filter-select" id="z4-filter-status">
          <option value="">All Status</option>
          <option value="Available">Available</option>
          <option value="Reserved">Reserved</option>
          <option value="Sold">Sold</option>
        </select>
        <select class="filter-select" id="z4-filter-floor">
          <option value="">All Floors</option>
        </select>
      </div>
      <div class="search-results" id="z4-results"></div>
    </div>
  </div>

  <!-- Zone 5: Quick Settings (Top Right) -->
  <div id="z5" class="zone zone-l zone-settings">
    <div class="settings-icons">
      <button class="icon-btn" id="z5-dark-mode" title="Toggle Dark Mode">
        <span class="material-symbols-outlined">dark_mode</span>
      </button>
      <button class="icon-btn" id="z5-zoom-in" title="Zoom In">
        <span class="material-symbols-outlined">add</span>
      </button>
      <button class="icon-btn" id="z5-zoom-out" title="Zoom Out">
        <span class="material-symbols-outlined">remove</span>
      </button>
      <button class="icon-btn" id="z5-reset" title="Reset View">
        <span class="material-symbols-outlined">center_focus_strong</span>
      </button>
      <button class="icon-btn" id="z5-fullscreen" title="Fullscreen">
        <span class="material-symbols-outlined">fullscreen</span>
      </button>
    </div>
  </div>

  <!-- Unit Popup -->
  <div id="up"></div>

  <!-- Full Gallery Lightbox -->
  <div id="lb" role="dialog" aria-label="Image viewer">
    <button class="lbb lb-cl" id="lbc" aria-label="Close">
      <span class="material-symbols-outlined">close</span>
    </button>
    <button class="lbb lb-pv" id="lbp" aria-label="Previous">
      <span class="material-symbols-outlined">chevron_left</span>
    </button>
    <button class="lbb lb-nx" id="lbn" aria-label="Next">
      <span class="material-symbols-outlined">chevron_right</span>
    </button>
    <div class="lb-ct" id="lbk"></div>
    <img id="lbi" src="" alt="Gallery image"/>
    <div class="lb-ds" id="lbd"></div>
  </div>

  <!-- Unit Details Modal -->
  <div id="um" role="dialog" aria-label="Unit details">
    <div class="um-c" id="umc"></div>
  </div>

  <!-- Project Details Modal -->
  <div id="pd" role="dialog" aria-label="Project details">
    <div class="pd-c" id="pdc">
      <div class="pd-header">
        <div class="pd-title">
          <span class="material-symbols-outlined">apartment</span>
          <h2>Project Details</h2>
        </div>
        <button class="pd-close" id="pd-close">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="pd-body" id="pd-body">
        <!-- Dynamic content -->
      </div>
    </div>
  </div>

  <!-- 3D Floor Plan Modal -->
  <div id="fp3d" role="dialog" aria-label="3D Floor Plan">
    <div class="fp3d-c">
      <div class="fp3d-header">
        <div class="fp3d-title">
          <span class="material-symbols-outlined">view_in_ar</span>
          <h2>3D Floor Plan</h2>
        </div>
        <button class="fp3d-close" id="fp3d-close">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="fp3d-body">
        <div class="fp3d-controls">
          <button class="fp3d-control-btn" id="fp3d-prev" title="Previous Floor">
            <span class="material-symbols-outlined">keyboard_arrow_up</span>
          </button>
          <div class="fp3d-floor-indicator" id="fp3d-floor">Floor 1</div>
          <button class="fp3d-control-btn" id="fp3d-next" title="Next Floor">
            <span class="material-symbols-outlined">keyboard_arrow_down</span>
          </button>
        </div>
        <div class="fp3d-viewer" id="fp3d-viewer">
          <!-- 3D floor plan renders here -->
        </div>
      </div>
    </div>
  </div>
</div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.168.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.168.0/examples/jsm/"}}</script>
<script type="module">
window.__DATA_PATH = "tour-data.json";
window.__LOAD_MODE = "zip";
window.__MAP_LAT = 40.7128;
window.__MAP_LNG = -74.0060;
</script>
<script type="module" src="./viewer/viewer.js?v=14"></script>
</body>
</html>
