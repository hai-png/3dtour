<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starting Server...</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 16px;
        }
        p {
            color: #a0a0c0;
            margin-bottom: 24px;
        }
        .link {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #7cb342, #5a8a2a);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .link:hover {
            transform: translateY(-2px);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #7cb342;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Starting 3D Tour Server...</h1>
        <p>Opening browser automatically...</p>
        <a href="http://localhost:8080" class="link" id="tourLink">Open 3D Tour</a>
    </div>
    <script>
        setTimeout(() => {
            window.location.href = 'http://localhost:8080';
        }, 2000);
    </script>
</body>
</html>
