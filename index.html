<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="manifest.json">
<title>3D Interactive Tour</title>
<style>
:root{
--pri:#7cb342;--pri-d:#5a8a2a;--pri-l:#aed581;--pri-a:rgba(124,179,66,.15);
--ok:#22c55e;--warn:#f59e0b;--err:#ef4444;--info:#3b82f6;
--bg:#f4f5f7;--card:#fff;--card2:#f9fafb;--inp:#fff;
--t1:#1a1a2e;--t2:#555570;--t3:#8888a0;
--b1:rgba(0,0,0,.08);--b2:rgba(0,0,0,.14);
--rs:6px;--rm:10px;--rl:14px;--rxl:18px;
--ss:0 1px 4px rgba(0,0,0,.07);--sm:0 4px 14px rgba(0,0,0,.10);--sl:0 8px 28px rgba(0,0,0,.13);
--t-f:.18s ease;--t-n:.28s ease;--t-s:.4s ease;
}
[data-theme="dark"]{--bg:#16162a;--card:#222240;--card2:#282848;--inp:#2c2c4c;--t1:#e4e4f0;--t2:#a8a8c4;--t3:#6e6e94;--b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:var(--t1);overflow:hidden;-webkit-font-smoothing:antialiased;touch-action:none}
button{font-family:inherit;border:none;cursor:pointer}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes introZoom{from{transform:scale(1.15);opacity:0}to{transform:scale(1);opacity:1}}

/* ═══ SVG Icon System ═══ */
.ico{display:inline-flex;width:1em;height:1em;fill:currentColor;flex-shrink:0}

/* ═══ Canvas ═══ */
#c{position:fixed;inset:0;display:block;z-index:0;touch-action:none}

/* ═══ Tour Intro Overlay ═══ */
#intro{position:fixed;inset:0;z-index:10000;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s,visibility .8s}
#intro.gone{opacity:0;visibility:hidden;pointer-events:none}
#intro .intro-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(8px) brightness(.4);transform:scale(1.1)}
#intro .intro-content{position:relative;z-index:1;text-align:center;animation:introZoom 1.2s ease both}
#intro .intro-logo{width:90px;height:90px;border-radius:22px;margin:0 auto 20px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4);background:#fff;display:flex;align-items:center;justify-content:center;padding:8px}
#intro .intro-logo img{width:100%;height:100%;object-fit:contain}
#intro h1{color:#fff;font-size:28px;font-weight:800;margin-bottom:8px;letter-spacing:.5px}
#intro .intro-loc{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:4px}
#intro .intro-tag{color:rgba(255,255,255,.35);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:30px}
#intro .intro-stats{display:flex;gap:20px;justify-content:center;margin-bottom:32px}
#intro .intro-stat{text-align:center}
#intro .intro-stat b{display:block;color:#fff;font-size:22px;font-weight:700}
#intro .intro-stat small{color:rgba(255,255,255,.4);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
#intro .intro-enter{padding:14px 40px;background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff;border-radius:var(--rl);font-size:15px;font-weight:700;letter-spacing:.5px;box-shadow:0 4px 20px rgba(124,179,66,.4);transition:all .3s}
#intro .intro-enter:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(124,179,66,.5)}
.intro-progress{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin:0 auto 12px;overflow:hidden}
.intro-progress i{display:block;height:100%;width:0%;background:var(--pri);transition:width .2s}
.intro-pct{color:rgba(255,255,255,.3);font-size:11px;margin-bottom:20px}

/* ═══ Header ═══ */
#hdr{position:fixed;top:10px;left:12px;z-index:100;display:flex;align-items:center;gap:8px;animation:fadeIn .5s .3s both}
#hdr .logo{width:36px;height:36px;border-radius:var(--rs);overflow:hidden;box-shadow:var(--sm);background:#fff;display:flex;align-items:center;justify-content:center;padding:2px}
#hdr .logo img{width:100%;height:100%;object-fit:contain}
#hdr .name{font-size:13px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.hbtn{padding:5px 11px;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.12);border-radius:var(--rm);color:#fff;font-size:10px;font-weight:500;transition:background var(--t-f);display:flex;align-items:center;gap:4px}
.hbtn:hover{background:rgba(255,255,255,.2)}

/* ═══ Detail Panel (right) ═══ */
#detail{position:fixed;top:12px;right:12px;width:330px;max-height:calc(100vh - 24px);z-index:100;display:flex;flex-direction:column;background:var(--card);border-radius:var(--rxl);border-right:3px solid var(--pri);box-shadow:var(--sl);transition:all var(--t-n);animation:scaleIn .4s .35s both;overflow:hidden}
#detail.shut .d-body{max-height:0;min-height:0;padding:0 10px;opacity:0;overflow:hidden}
.d-hdr{display:flex;align-items:center;gap:7px;padding:10px 11px;border-bottom:1px solid var(--b1);cursor:pointer;user-select:none;flex-shrink:0}
.d-hdr .ic{width:26px;height:26px;background:var(--pri-a);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:13px}
.d-hdr span{font-size:12px;font-weight:600;flex:1;color:var(--t1)}
.tog{width:22px;height:22px;background:var(--card2);border:1px solid var(--b1);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--t3);transition:all var(--t-f);line-height:1}
.tog:hover{background:var(--pri-a);color:var(--pri)}
.d-body{padding:10px;overflow-y:auto;min-height:240px;transition:all var(--t-n);flex:1}

/* Hero carousel */
.hero-car{position:relative;width:100%;height:160px;border-radius:var(--rm);overflow:hidden;margin-bottom:8px;background:#111}
.hero-car img,.hero-car video{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;opacity:0;transition:opacity .5s}
.hero-car img.active,.hero-car video.active{opacity:1}
.hero-car .hero-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:2}
.hero-car .hdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.35);border:none;cursor:pointer;transition:all var(--t-f)}
.hero-car .hdot.on{background:#fff;width:14px;border-radius:3px}
.hero-car .hero-nav{position:absolute;top:50%;transform:translateY(-50%);width:22px;height:22px;background:rgba(0,0,0,.4);border:none;border-radius:50%;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;z-index:2;opacity:0;transition:opacity var(--t-f)}
.hero-car:hover .hero-nav{opacity:1}
.hero-car .hero-nav.p{left:4px}.hero-car .hero-nav.n{right:4px}

.prj-desc{font-size:11px;line-height:1.55;color:var(--t2);background:var(--card2);padding:8px;border-radius:var(--rm);border:1px solid var(--b1)}

/* Unit card */
.u-card{animation:fadeIn .25s;min-height:120px}
.u-carousel{position:relative;width:100%;height:140px;border-radius:var(--rm);overflow:hidden;margin-bottom:8px;background:#111}
.u-carousel img,.u-carousel video{width:100%;height:100%;object-fit:cover;display:block}
.u-carousel .mc{position:absolute;top:5px;right:5px;padding:2px 6px;background:rgba(0,0,0,.6);border-radius:6px;font-size:8px;color:#fff;font-weight:600}
.cb{position:absolute;top:50%;transform:translateY(-50%);width:24px;height:24px;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);border-radius:50%;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;z-index:2;transition:background var(--t-f)}
.cb:hover{background:rgba(0,0,0,.7)}.cb.p{left:4px}.cb.n{right:4px}
.cdots{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);display:flex;gap:3px;z-index:2}
.cdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);border:none;cursor:pointer;transition:all var(--t-f)}.cdot.on{background:#fff;transform:scale(1.3)}
.u-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:4px}
.u-name{font-size:12.5px;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:4px}
.badge{padding:2px 7px;border-radius:12px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.b-ok{background:rgba(34,197,94,.14);color:var(--ok)}.b-warn{background:rgba(245,158,11,.14);color:var(--warn)}.b-err{background:rgba(239,68,68,.14);color:var(--err)}
.u-sub{font-size:9.5px;color:var(--t3);margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.u-sub .sep{width:3px;height:3px;border-radius:50%;background:var(--t3)}
.u-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:6px}
.u-st{text-align:center;padding:5px 2px;background:var(--card2);border-radius:var(--rs);border:1px solid var(--b1)}
.u-st small{display:block;font-size:7.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:1px}.u-st b{font-size:10.5px;font-weight:600;color:var(--t1)}.u-st b.pr{color:var(--pri)}
.u-desc{font-size:10.5px;line-height:1.5;color:var(--t2);background:var(--card2);padding:7px;border-radius:var(--rs);border:1px solid var(--b1);margin-bottom:6px}
.u-feats{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.u-feat{padding:2px 6px;background:var(--pri-a);border-radius:7px;font-size:8.5px;color:var(--pri);font-weight:600}
.u-actions{display:flex;gap:4px;flex-wrap:wrap}
.u-btn{flex:1;min-width:0;padding:6px 5px;border-radius:var(--rm);font-size:9.5px;font-weight:600;transition:all var(--t-f);display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap}
.u-btn-p{background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff}
.u-btn-p:hover{box-shadow:0 2px 10px rgba(124,179,66,.3);transform:translateY(-1px)}
.u-btn-s{background:var(--card2);color:var(--t2);border:1px solid var(--b1)}
.u-btn-s:hover{background:var(--pri-a);color:var(--pri)}

/* Preview thumbnails for floor plan & panorama */
.u-previews{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px}
.u-preview{position:relative;height:60px;border-radius:var(--rs);overflow:hidden;cursor:pointer;border:1px solid var(--b1);transition:all var(--t-f)}
.u-preview:hover{border-color:var(--pri);transform:scale(1.02)}
.u-preview img{width:100%;height:100%;object-fit:cover}
.u-preview canvas{width:100%;height:100%}
.u-preview .pv-label{position:absolute;bottom:0;left:0;right:0;padding:3px 6px;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff;font-size:8px;font-weight:600;display:flex;align-items:center;gap:3px}
.u-preview .pv-icon{font-size:12px}
/* Panorama thumbnail in unit card */
.u-preview.pano{background:#111;display:flex;align-items:center;justify-content:center;font-size:20px}

/* Expandable area details */
.u-area-toggle{width:100%;padding:6px 8px;background:var(--card2);border:1px solid var(--b1);border-radius:var(--rs);font-size:9.5px;font-weight:600;color:var(--t2);display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;transition:all var(--t-f)}
.u-area-toggle:hover{background:var(--pri-a);color:var(--pri)}
.u-area-body{display:none;margin-bottom:6px}
.u-area-body.open{display:block;animation:fadeIn .2s}
.u-ab-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:4px}
.u-ab{text-align:center;padding:4px;background:var(--card2);border-radius:3px;border:1px solid var(--b1)}
.u-ab small{display:block;font-size:7px;color:var(--t3);text-transform:uppercase}.u-ab b{font-size:9.5px;color:var(--t1)}
.fa-list{background:var(--card2);border:1px solid var(--b1);border-radius:var(--rs);overflow:hidden}
.fa-row{display:flex;justify-content:space-between;padding:3px 7px;font-size:9px;border-bottom:1px solid var(--b1)}
.fa-row:last-child{border-bottom:none}
.fa-row .fn{color:var(--t2)}.fa-row .fv{color:var(--t1);font-weight:600}

/* Hotspot card */
.hs-card{animation:fadeIn .25s}
.hs-head{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.hs-ic{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px}
.hs-ti{font-size:12.5px;font-weight:700;color:var(--t1)}
.hs-imgs{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px}
.hs-img{height:70px;border-radius:var(--rs);overflow:hidden;cursor:pointer;border:1px solid var(--b1)}
.hs-img img{width:100%;height:100%;object-fit:cover}

/* ═══ Search Panel (bottom-center) ═══ */
#search{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:520px;max-width:calc(100vw - 24px);z-index:100;background:var(--card);border-radius:var(--rxl);border-bottom:3px solid var(--pri);box-shadow:var(--sl);transition:all var(--t-n);animation:slideUp .4s .45s both;overflow:hidden}
#search.shut{height:40px}
#search.shut .s-body{max-height:0;padding:0 10px;opacity:0;overflow:hidden}
#search:not(.shut){height:280px}
.s-hdr{display:flex;align-items:center;gap:7px;padding:8px 10px;border-bottom:1px solid var(--b1);cursor:pointer;user-select:none;flex-shrink:0}
.s-hdr .ic{width:22px;height:22px;background:var(--pri-a);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:11px}
.s-hdr span{font-size:11.5px;font-weight:600;flex:1;color:var(--t1)}
.s-body{padding:10px 12px;overflow-y:auto;transition:all var(--t-n);flex:1}
.sr{display:flex;gap:6px;margin-bottom:8px}
.si{flex:1;padding:7px 11px;background:var(--inp);border:1px solid var(--b1);border-radius:var(--rm);font-size:12.5px;color:var(--t1);outline:none;transition:border var(--t-f);font-family:inherit}
.si:focus{border-color:var(--pri)}
.sb,.rb{padding:7px 13px;border-radius:var(--rm);font-size:11.5px;font-weight:600;transition:all var(--t-f)}
.sb{background:var(--pri);color:#fff}.sb:hover{background:var(--pri-d)}
.rb{background:var(--card2);color:var(--t2);border:1px solid var(--b1)}.rb:hover{background:var(--pri-a);color:var(--pri)}
.fs{flex:1;padding:6px 9px;background:var(--inp);border:1px solid var(--b1);border-radius:var(--rs);font-size:11.5px;color:var(--t1);outline:none;cursor:pointer;font-family:inherit}
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;max-height:140px;overflow-y:auto}
.rc{padding:7px 9px;background:var(--card2);border:1px solid var(--b1);border-radius:var(--rs);cursor:pointer;transition:all var(--t-f)}
.rc:hover{transform:translateY(-2px);box-shadow:var(--sm);border-color:var(--pri)}.rc.on{background:var(--pri-a);border-color:var(--pri)}
.rn{font-size:11.5px;font-weight:700;color:var(--t1)}.ri{font-size:9.5px;color:var(--t3)}.rp{font-size:11.5px;font-weight:700;color:var(--pri);margin-top:2px}
.rs{display:inline-block;padding:2px 5px;border-radius:6px;font-size:8.5px;font-weight:600;text-transform:uppercase;margin-top:2px}

/* ═══ Tools (left) ═══ */
#tools{position:fixed;left:12px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:5px;animation:fadeIn .4s .55s both}
.tb{width:30px;height:30px;background:rgba(255,255,255,.11);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.12);border-radius:50%;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all var(--t-f)}
.tb:hover{background:rgba(255,255,255,.2);transform:scale(1.08)}.tb.on{background:var(--pri);border-color:var(--pri)}

/* ═══ Gallery widget (bottom-right) ═══ */
#gal{position:fixed;bottom:12px;right:12px;z-index:100;display:flex;align-items:center;gap:8px;padding:7px 12px;background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:var(--rxl);cursor:pointer;transition:all var(--t-n);animation:slideUp .4s .6s both}
#gal:hover{background:rgba(255,255,255,.16);transform:translateY(-2px)}
.gt{display:flex;margin-right:-4px}
.gth{width:38px;height:38px;border-radius:var(--rm);border:2px solid rgba(255,255,255,.22);margin-right:-8px;overflow:hidden;background:#1a2a4a;transition:transform var(--t-s)}.gth:hover{transform:scale(1.08);z-index:1}.gth img{width:100%;height:100%;object-fit:cover}
.gmore{width:38px;height:38px;border-radius:var(--rm);background:rgba(0,0,0,.4);border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;margin-right:-8px}
.gtxt{margin-left:6px}.gtxt .t1{font-size:10.5px;font-weight:600;color:#fff}.gtxt .t2{font-size:8.5px;color:rgba(255,255,255,.4)}

/* ═══ Hotspot markers ═══ */
.hs-m{position:fixed;z-index:50;cursor:pointer;transition:transform var(--t-f),opacity var(--t-f);pointer-events:auto}
.hs-m.occluded{opacity:0;pointer-events:none}
.hs-m:hover{transform:scale(1.15)}.hs-m.sel{transform:scale(1.25)}
.hs-dome{width:30px;height:30px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.35);animation:bob 3s ease-in-out infinite}
.hs-lbl{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:2px;padding:2px 6px;background:rgba(0,0,0,.65);backdrop-filter:blur(3px);border-radius:4px;font-size:8.5px;font-weight:600;color:#fff;white-space:nowrap}

/* ═══ Lightbox with controls ═══ */
#lb{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.94);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;flex-direction:column}
#lb.open{display:flex}
#lb .lb-media{max-width:85vw;max-height:calc(80vh - 80px);object-fit:contain;border-radius:var(--rl);animation:scaleIn .2s;box-shadow:var(--sl);transition:transform .3s}
.lb-ctrl{position:absolute;background:rgba(255,255,255,.12);border:none;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;transition:background var(--t-f)}
.lb-ctrl:hover{background:rgba(255,255,255,.25)}
.lb-x{top:14px;right:14px;width:42px;height:42px;font-size:18px}
.lb-nav{top:50%;transform:translateY(-50%);width:46px;height:46px;font-size:16px}
.lb-nav.p{left:14px}.lb-nav.nx{right:14px}
.lb-cnt{position:absolute;top:14px;left:14px;padding:4px 12px;background:rgba(0,0,0,.5);border-radius:12px;color:#fff;font-size:13px}
.lb-type{position:absolute;top:14px;left:50%;transform:translateX(-50%);padding:4px 10px;background:rgba(0,0,0,.5);border-radius:8px;color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:.8px}
.lb-dots{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.lb-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.25);border:none;cursor:pointer;transition:all var(--t-f)}.lb-dot.on{background:#fff;transform:scale(1.3)}
/* Lightbox quick controls - centered zoom controls */
.lb-tools{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:6px;background:rgba(0,0,0,.6);padding:8px 12px;border-radius:30px;backdrop-filter:blur(4px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.lb-tool{width:38px;height:38px;background:rgba(255,255,255,.15);border:none;border-radius:50%;color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background var(--t-f);cursor:pointer}.lb-tool:hover{background:rgba(255,255,255,.3)}

/* ═══ Project Details Modal ═══ */

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';
import{GLTFLoader}from'three/addons/loaders/GLTFLoader.js';
import{DRACOLoader}from'three/addons/loaders/DRACOLoader.js';
import{MeshoptDecoder}from'three/addons/libs/meshopt_decoder.module.js';
import{RGBELoader}from'three/addons/loaders/RGBELoader.js';

const CFG={dataPath:window.__DATA_PATH||'tour-data.json',zoomStep:5,flyDur:1300};
let TD=null;

// ═══ LOADER ═══
const AL=(()=>{let ld=0,tot=0;const b=()=>document.getElementById('intro-bar'),p=()=>document.getElementById('intro-pct');
function upd(l){const pc=tot?Math.round(ld/tot*100):0;b().style.width=pc+'%';p().textContent=l||pc+'%';}
function trk(n,pr){tot++;return pr.then(r=>{ld++;upd(n+' ✓');return r}).catch(e=>{ld++;upd(n+' ✗');throw e});}
async function json(u){return trk('Tour data',fetch(u).then(r=>{if(!r.ok)throw Error(`HTTP ${r.status}`);return r.json()}))}
function glb(u,l){return trk(l||'Model',new Promise((res,rej)=>{const lo=new GLTFLoader();const dr=new DRACOLoader();dr.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');lo.setDRACOLoader(dr);lo.setMeshoptDecoder(MeshoptDecoder);lo.load(u,g=>res(g),xhr=>{if(xhr.total)p().textContent=`${l||'Model'} ${Math.round(xhr.loaded/xhr.total*100)}%`},rej)}))}
function hdri(u){return trk('Environment',new Promise((res,rej)=>{new RGBELoader().load(u,t=>{t.mapping=THREE.EquirectangularReflectionMapping;res(t)},undefined,rej)}))}
function imgs(urls){if(!urls?.length)return Promise.resolve([]);return trk(`${urls.length} images`,Promise.allSettled(urls.map(u=>new Promise((r,j)=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>r(i);i.onerror=j;i.src=u}))))}
function done(){upd('Ready!');document.getElementById('intro-enter').style.display='';}
return{json,glb,hdri,imgs,done,upd}})();

// ═══ ENGINE ═══
const E=(()=>{
let R,S,C,Ctrl,dCam,dTgt,flying=0;
let colliders=[]; // building collision meshes

function init(){
  const cv=document.getElementById('c');
  R=new THREE.WebGLRenderer({canvas:cv,antialias:true,powerPreference:'high-performance'});
  R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2));
  R.shadowMap.enabled=true;R.shadowMap.type=THREE.PCFSoftShadowMap;
  R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=1.0;R.outputColorSpace=THREE.SRGBColorSpace;
  S=new THREE.Scene();S.fog=new THREE.Fog(0x0f172a,80,250);
  C=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,.1,500);
  // Set initial camera position far away
  C.position.set(100,80,100);
  Ctrl=new OrbitControls(C,cv);Ctrl.enableDamping=true;Ctrl.dampingFactor=.06;Ctrl.minDistance=10;Ctrl.maxDistance=180;Ctrl.maxPolarAngle=Math.PI/2-.02;
  Ctrl.target.set(0,15,0);
  addEventListener('resize',()=>{C.aspect=innerWidth/innerHeight;C.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)});
}

function configure(d){
  // Use default camera from JSON or compute a good view based on building bbox
  const jsonCam=d.defaultCamera;
  if(jsonCam){
    dCam=new THREE.Vector3(...jsonCam);
    dTgt=new THREE.Vector3(...(d.defaultTarget||[0,15,0]));
  }
  // Camera will be set after model loads to ensure proper view
  S.add(new THREE.AmbientLight(0xffffff,.5));
  const sun=new THREE.DirectionalLight(0xfff5e6,1.8);sun.position.set(15,30,15);sun.castShadow=true;
  sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.near=.5;sun.shadow.camera.far=100;
  sun.shadow.camera.left=sun.shadow.camera.bottom=-40;sun.shadow.camera.right=sun.shadow.camera.top=40;sun.shadow.bias=-.0005;
  S.add(sun);S.add(new THREE.DirectionalLight(0x8899cc,.4).translateX(-12).translateY(10).translateZ(-8));
  const gnd=new THREE.Mesh(new THREE.PlaneGeometry(300,300),new THREE.MeshStandardMaterial({color:0x141e30,roughness:.85,metalness:.1}));
  gnd.rotation.x=-Math.PI/2;gnd.position.y=-.05;gnd.receiveShadow=true;S.add(gnd);
}

function setEnv(tex){S.environment=tex;
  // Blur background - render to a lower-res texture
  const pmrem=new THREE.PMREMGenerator(R);
  pmrem.compileEquirectangularShader();
  const envMap=pmrem.fromEquirectangular(tex).texture;
  S.environment=envMap;
  // Create blurred background
  const bgTex=tex.clone();bgTex.mapping=THREE.EquirectangularReflectionMapping;
  S.background=bgTex;S.backgroundBlurriness=.08;S.backgroundIntensity=.7;
  pmrem.dispose();
}

function setFallbackBg(){
  const cv=document.createElement('canvas');cv.width=cv.height=512;const cx=cv.getContext('2d');
  const g=cx.createLinearGradient(0,0,0,512);g.addColorStop(0,'#1e3050');g.addColorStop(.45,'#0f172a');g.addColorStop(1,'#080c14');
  cx.fillStyle=g;cx.fillRect(0,0,512,512);
  const t=new THREE.CanvasTexture(cv);t.mapping=THREE.EquirectangularReflectionMapping;
  S.background=t;S.environment=t;
}

function addCollider(mesh){colliders.push(mesh);}

// Smart fly-to: avoid flying through building
function flyTo(pos,look,dur=CFG.flyDur){
  return new Promise(res=>{
    if(flying)return res();flying=1;Ctrl.enabled=false;
    const sp=C.position.clone(),st=Ctrl.target.clone();

    // Check if direct path intersects colliders
    let wp=pos.clone();
    if(colliders.length){
      const dir=new THREE.Vector3().subVectors(pos,sp).normalize();
      const rc=new THREE.Raycaster(sp,dir,0,sp.distanceTo(pos));
      const hits=rc.intersectObjects(colliders,true);
      if(hits.length){
        // Route around: go up and over
        const mid=new THREE.Vector3().addVectors(sp,pos).multiplyScalar(.5);
        const bboxC=new THREE.Box3();colliders.forEach(m=>{const b=new THREE.Box3().setFromObject(m);bboxC.union(b)});
        const maxY=bboxC.max.y+8;
        wp=pos.clone();
        // Two-phase fly: up then to target
        const phase1=mid.clone();phase1.y=Math.max(maxY,sp.y,pos.y);
        const t0=performance.now();
        const ease=t=>t<.5?4*t*t*t:1-(-2*t+2)**3/2;
        const halfDur=dur*.45;
        (function step1(now){
          const p=Math.min((now-t0)/halfDur,1),e=ease(p);
          C.position.lerpVectors(sp,phase1,e);Ctrl.target.lerpVectors(st,look,e*.5);Ctrl.update();
          if(p<1)requestAnimationFrame(step1);
          else{const t1=performance.now();
            (function step2(now2){
              const p2=Math.min((now2-t1)/(dur-halfDur),1),e2=ease(p2);
              C.position.lerpVectors(phase1,pos,e2);Ctrl.target.lerpVectors(Ctrl.target.clone(),look,.5+e2*.5);Ctrl.update();
              if(p2<1)requestAnimationFrame(step2);else{flying=0;Ctrl.enabled=true;res();}
            })(t1);}
        })(t0);
        return;
      }
    }

    // Direct path
    const t0=performance.now();
    const ease=t=>t<.5?4*t*t*t:1-(-2*t+2)**3/2;
    (function step(now){
      const p=Math.min((now-t0)/dur,1),e=ease(p);
      C.position.lerpVectors(sp,wp,e);Ctrl.target.lerpVectors(st,look,e);Ctrl.update();
      if(p<1)requestAnimationFrame(step);else{flying=0;Ctrl.enabled=true;res();}
    })(t0);
  });
}

function zoom(d){const dir=new THREE.Vector3();C.getWorldDirection(dir);const nv=C.position.clone().add(dir.multiplyScalar(d*CFG.zoomStep));const dist=nv.distanceTo(Ctrl.target);if(dist>=10&&dist<=180){
  // Collision check using building bbox mesh or colliders to restrict zooming into building
  if(d>0&&colliders.length){const rc=new THREE.Raycaster(C.position.clone(),dir.normalize(),0,CFG.zoomStep);const h=rc.intersectObjects(colliders,true);if(h.length)return;}
  C.position.copy(nv);
}}
function resetView(){
  // Use the stored default camera position
  if(dCam && dTgt){
    return flyTo(dCam.clone(),dTgt.clone());
  }
  // Fallback to initial position
  return flyTo(new THREE.Vector3(100,80,100),new THREE.Vector3(0,15,0));
}

const _pv=new THREE.Vector3();
function project(pos){_pv.copy(pos).project(C);if(_pv.z>1||_pv.z<-1)return null;return{x:(_pv.x*.5+.5)*innerWidth,y:(-_pv.y*.5+.5)*innerHeight}}

// Occlusion test
const _rc=new THREE.Raycaster();
function isOccluded(pos){
  if(!colliders.length)return false;
  const dir=new THREE.Vector3().subVectors(pos,C.position);
  const dist=dir.length();dir.normalize();
  _rc.set(C.position,dir);_rc.far=dist;
  const hits=_rc.intersectObjects(colliders,true);
  if(!hits.length)return false;
  
  // Check if hit is significantly closer than target (not just at the target)
  const hitDist=hits[0].distance;
  const margin=5; // Allow margin for hotspots on the building surface
  
  // If hotspot is above the building (high Y), check if ray hits the side before reaching it
  if(pos.y>40){
    // Get the hit point
    const hitPt=new THREE.Vector3();
    _rc.ray.at(hitDist,hitPt);
    // If hit point is much lower than hotspot, the hotspot should be visible (on roof)
    if(pos.y-hitPt.y>10)return false;
  }
  
  return hitDist<dist-margin;
}

function render(){Ctrl.update();R.render(S,C);}
return{init,configure,setEnv,setFallbackBg,flyTo,zoom,resetView,project,isOccluded,render,addCollider,isFlying:()=>flying,scene:()=>S,camera:()=>C,controls:()=>Ctrl,renderer:()=>R};
})();

// ═══ MODEL + AUTO-TAG ═══
const Mdl=(()=>{
const map=new Map();const hsMap=new Map();let buildingBBox=null;

// Levenshtein distance for fuzzy string matching
function levenshtein(a,b){
  const s=[];for(let i=0;i<=a.length;i++)s[i]=[i];for(let j=0;j<=b.length;j++)s[0][j]=j;
  for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)s[i][j]=b[i-1]===a[j-1]?s[i-1][j-1]:Math.min(s[i-1][j]+1,s[i][j-1]+1,s[i-1][j-1]+1);
  return s[a.length][b.length];
}

function load(gltf){
  const root=gltf.scene;const t=TD.modelTransform||{};
  if(t.position)root.position.set(...t.position);
  if(t.rotation)root.rotation.set(...t.rotation.map(v=>v*Math.PI/180));
  if(t.scale){const s=Array.isArray(t.scale)?t.scale:[t.scale,t.scale,t.scale];root.scale.set(...s);}
  root.updateMatrixWorld(true);

  const norm=s=>(s||'').toLowerCase().replace(/[\s_\-\.]/g,'');

  root.traverse(child=>{
    if(!child.isMesh)return;
    child.castShadow=true;child.receiveShadow=true;
    const nName=child.name.trim();
    const gName=child.geometry?.name?.trim()||'';

    // Check for collision/building bbox marker
    if(norm(nName).includes('collision')||norm(nName).includes('buildingbbox')||norm(nName).includes('building_bounds')||norm(nName).includes('building_bbox')||
       norm(gName).includes('collision')||norm(gName).includes('buildingbbox')||norm(gName).includes('building_bounds')||norm(gName).includes('building_bbox')){
      child.visible=false;
      child.material=new THREE.MeshBasicMaterial({visible:false});
      child.userData={isBuildingBBox:true};
      E.addCollider(child);
      buildingBBox=new THREE.Box3().setFromObject(child);
      return;
    }

    // Auto-tag hotspots: meshes named hotspot_* or hs_* or matching hotspot labels
    const normN=norm(nName);
    const normG=norm(gName);
    const isHotspotMesh=normN.startsWith('hotspot')||normN.startsWith('hs_')||normG.startsWith('hotspot')||normG.startsWith('hs_');

    // Also check if mesh name matches any hotspot label from JSON
    let matchedHS=null;
    if(!isHotspotMesh){
      const allHS=TD.hotspots||[];
      matchedHS=allHS.find(h=>{
        const normHLabel=norm(h.label);
        const normHId=norm(h.id||'');
        
        // Exact match (normalized)
        if(normN===normHLabel||normG===normHLabel||normN===normHId||normG===normHId)return true;
        
        // Partial match: check if hotspot label is contained in mesh name
        if(normHLabel&&normHLabel.length>3&&(normN.includes(normHLabel)||normG.includes(normHLabel)))return true;
        
        // Split into words and check if all words match (handles "Green Terrace" vs "green_terrace")
        const labelWords=normHLabel.split(/[\s_\-]+/).filter(w=>w.length>2);
        const meshNameWords=normN.split(/[\s_\-]+/).filter(w=>w.length>2);
        const gNameWords=normG.split(/[\s_\-]+/).filter(w=>w.length>2);
        const allMeshWords=[...meshNameWords,...gNameWords];
        
        if(labelWords.length>1){
          // Check if all label words are found in mesh name words (with fuzzy matching)
          const allWordsMatch=labelWords.every(lw=>allMeshWords.some(mw=>{
            // Exact or contains
            if(mw.includes(lw)||lw.includes(mw))return true;
            // Fuzzy: allow 1 character difference for longer words
            if(lw.length>=5&&mw.length>=5){
              const dist=levenshtein(lw,mw);
              if(dist<=2)return true;
            }
            return false;
          }));
          if(allWordsMatch)return true;
        }
        
        // Check individual word containment with fuzzy matching
        for(const labelWord of labelWords){
          if(labelWord.length<3)continue;
          for(const meshWord of allMeshWords){
            if(meshWord.length<3)continue;
            // Exact match or contains
            if(meshWord===labelWord||meshWord.includes(labelWord)||labelWord.includes(meshWord))return true;
            // Fuzzy: allow 1-2 character difference for longer words
            if(labelWord.length>=5&&meshWord.length>=5){
              const dist=levenshtein(labelWord,meshWord);
              if(dist<=2)return true;
            }
          }
        }
        
        return false;
      });
    }

    if(isHotspotMesh||matchedHS){
      child.geometry.computeBoundingBox();
      const center=new THREE.Vector3();
      child.geometry.boundingBox.clone().applyMatrix4(child.matrixWorld).getCenter(center);
      // Use the mesh name as key, extract label from name or matched hotspot
      const label=matchedHS?matchedHS.label:nName.replace(/^(hotspot_?|hs_)/i,'').replace(/[_-]/g,' ').trim()||nName;
      const key=matchedHS?matchedHS.id||normN:nName;
      hsMap.set(key,{position:[center.x,center.y,center.z],label:label,meshName:nName,mesh:child});
      // Also index by normalized label for easier matching
      hsMap.set('label:'+norm(label),{position:[center.x,center.y,center.z],label:label,meshName:nName,mesh:child});
      child.visible=false;
      child.userData={isHotspot:true,label:label};
      return;
    }

    // Auto-tag units: check both node name AND geometry name
    const unit=TD.units.find(u=>{
      const candidates=[u.meshName,u.unitNumber,u.name,u.id];
      return candidates.some(c=>c&&(norm(c)===norm(nName)||norm(c)===norm(gName)||nName===c||gName===c));
    });

    if(unit){
      map.set(unit.id,child);
      child.geometry.computeBoundingBox();
      const box=child.geometry.boundingBox.clone().applyMatrix4(child.matrixWorld);
      unit._meshBBox=box;unit._mesh=child;
      child.userData={unitId:unit.id,isUnit:true};
    }
  });

  E.scene().add(root);

  // If no explicit collision mesh, use building bbox from all unit meshes
  if(!buildingBBox&&map.size){
    buildingBBox=new THREE.Box3();
    map.forEach(m=>{const b=new THREE.Box3().setFromObject(m);buildingBBox.union(b)});
    // Create invisible collision box
    const size=buildingBBox.getSize(new THREE.Vector3());
    const center=buildingBBox.getCenter(new THREE.Vector3());
    const colMesh=new THREE.Mesh(new THREE.BoxGeometry(size.x+2,size.y+2,size.z+2),new THREE.MeshBasicMaterial({visible:false}));
    colMesh.position.copy(center);E.scene().add(colMesh);E.addCollider(colMesh);
  }

  // Set camera position after model loads using building_bbox mesh
  if(buildingBBox&&!E.isFlying()){
    const center=buildingBBox.getCenter(new THREE.Vector3());
    const size=buildingBBox.getSize(new THREE.Vector3());
    const maxDim=Math.max(size.x,size.y,size.z);

    if(dCam){
      // Use defaultCamera as absolute offsets from building center (in world units)
      // dCam = [xOffset, yOffset, zOffset] in absolute world units
      const camX=center.x+dCam.x;
      const camY=center.y+dCam.y;
      const camZ=center.z+dCam.z;
      const camPos=new THREE.Vector3(camX,camY,camZ);
      E.camera().position.copy(camPos);
      E.controls().target.copy(center);
      dCam=camPos.clone();
      dTgt=center.clone();
    }else{
      // Compute a good viewing distance based on building bbox
      const dist=maxDim*1.8;
      const camPos=new THREE.Vector3(center.x+dist,center.y+dist*.5,center.z+dist);
      E.camera().position.copy(camPos);
      E.controls().target.copy(center);
      dCam=camPos.clone();
      dTgt=center.clone();
    }
  } else {
    // Fallback: set a default camera position even without bbox
    if(dCam && !E.isFlying()){
      E.camera().position.copy(dCam);
      E.controls().target.set(0, 15, 0);
    }
  }

  return root;
}

function fallback(){
  // Fallback disabled - using building.glb model only
  // const floors=TD.projectDetails?.totalFloors||17;const fH=3.2;const g=new THREE.Group();
  // for(let i=0;i<floors;i++){const s=new THREE.Mesh(new THREE.BoxGeometry(28,.08,16),new THREE.MeshStandardMaterial({color:0x556688,roughness:.45,metalness:.3}));s.position.set(0,i*fH,-3);s.castShadow=true;g.add(s);}
  // const sh=new THREE.Mesh(new THREE.BoxGeometry(28,floors*fH,16),new THREE.MeshStandardMaterial({color:0x2a3a5a,roughness:.25,metalness:.65,transparent:true,opacity:.3}));sh.position.set(0,floors*fH/2,-3);sh.castShadow=true;g.add(sh);
  // const tp=new THREE.Mesh(new THREE.BoxGeometry(28,.15,16),new THREE.MeshStandardMaterial({color:0x7cb342,roughness:.4,metalness:.5}));tp.position.set(0,floors*fH,-3);g.add(tp);
  // E.scene().add(g);
  // // Collision box
  // const col=new THREE.Mesh(new THREE.BoxGeometry(30,floors*fH+2,18),new THREE.MeshBasicMaterial({visible:false}));col.position.set(0,floors*fH/2,-3);E.scene().add(col);E.addCollider(col);
}

return{load,fallback,map,hsMap:()=>hsMap,bbox:()=>buildingBBox};
})();

// ═══ UNITS ═══
const U=(()=>{
const meshes=[];let sel=null;const rc=new THREE.Raycaster(),ms=new THREE.Vector2();
function build(){const sc=TD.statusColors||{Available:'#22c55e',Reserved:'#f59e0b',Sold:'#ef4444'};
  TD.units.forEach(u=>{
    if(u._mesh){const ov=u._mesh.clone();ov.material=new THREE.MeshBasicMaterial({color:new THREE.Color(sc[u.status]||'#22c55e'),transparent:true,opacity:0,depthWrite:false,side:THREE.DoubleSide});ov.userData={id:u.id,unit:u,isOv:true};ov.renderOrder=999;E.scene().add(ov);meshes.push(ov);u._mesh.userData={id:u.id,unit:u};meshes.push(u._mesh);}
    else if(u.bbox){const mn=new THREE.Vector3(...u.bbox.min),mx=new THREE.Vector3(...u.bbox.max);const sz=new THREE.Vector3().subVectors(mx,mn),ct=new THREE.Vector3().addVectors(mn,mx).multiplyScalar(.5);const col=sc[u.status]||'#22c55e';const mat=new THREE.MeshBasicMaterial({color:new THREE.Color(col),transparent:true,opacity:.14,depthWrite:false});const m=new THREE.Mesh(new THREE.BoxGeometry(sz.x,sz.y,sz.z),mat);m.position.copy(ct);m.userData={id:u.id,unit:u};m.add(new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry),new THREE.LineBasicMaterial({color:new THREE.Color(col),transparent:true,opacity:.4})));E.scene().add(m);meshes.push(m);}
  });
}
function onClick(e){if(E.isFlying())return;ms.x=(e.clientX/innerWidth)*2-1;ms.y=-(e.clientY/innerHeight)*2+1;rc.setFromCamera(ms,E.camera());const h=rc.intersectObjects(meshes,false);if(h.length){const ud=h[0].object.userData;if(ud.unit)select(ud.unit);}}
function select(unit){
  desel();sel=unit;
  meshes.forEach(m=>{if(m.userData.id===unit.id){if(m.userData.isOv)m.material.opacity=.28;else if(m.material.transparent)m.material.opacity=.32;}});
  let center;
  if(unit._meshBBox){center=new THREE.Vector3();unit._meshBBox.getCenter(center);}
  else if(unit.bbox)center=new THREE.Vector3((unit.bbox.min[0]+unit.bbox.max[0])/2,(unit.bbox.min[1]+unit.bbox.max[1])/2,(unit.bbox.min[2]+unit.bbox.max[2])/2);
  else center=new THREE.Vector3(0,10,0);

  // Smart camera position: closer view focused on unit
  const bldgBBox=Mdl.bbox();
  let camOff,lookAt;
  if(bldgBBox){
    // Use unit center as look target for better framing
    lookAt=center.clone();
    // Position camera to show unit with building context
    const bSize=bldgBBox.getSize(new THREE.Vector3());
    const bCenter=bldgBBox.getCenter(new THREE.Vector3());
    const maxDim=Math.max(bSize.x,bSize.y,bSize.z);
    // Closer distance based on building size
    const dist=maxDim*1.2;
    // Get direction from building center to unit (horizontal direction)
    const unitDir=new THREE.Vector3().subVectors(center,bCenter);
    unitDir.y=0; // Ignore vertical component for direction
    unitDir.normalize();
    // If unit is at center, use default view direction
    if(unitDir.length()<.1)unitDir.set(0,0,1);
    // Position camera in direction of unit
    camOff=unitDir.clone().multiplyScalar(dist);
    // Set camera height to be at unit level, offset by building height for perspective
    camOff.y=(center.y-bCenter.y)*0.5+bSize.y*0.3;
  }else{
    camOff=new THREE.Vector3(5,3,8);
    lookAt=center;
  }
  E.flyTo(center.clone().add(camOff),lookAt);
  UI.expandDet();UI.showUnit(unit);Srch.hl(unit.id);
}

return{build,onClick,select,desel,sel:()=>sel,reset};
})();

const HS=(()=>{
const items=[];
function build(){
  const box=document.getElementById('hs-box');
  const allHS=[...(TD.hotspots||[])];

  // Get auto-tagged hotspots from model
  const meshHotspots=new Map();
  Mdl.hsMap().forEach((v,k)=>{
    // Store by normalized label for matching
    const normLabel=v.label.toLowerCase().replace(/[\s_\-\.]/g,'');
    meshHotspots.set(normLabel,v);
    // Also store by mesh name
    meshHotspots.set(k.toLowerCase(),v);
  });

  // Update existing hotspots with mesh positions when available
  allHS.forEach(h=>{
    // Try to find matching mesh hotspot by label or id
    const normHLabel=h.label.toLowerCase().replace(/[\s_\-\.]/g,'');
    const meshHS=meshHotspots.get(normHLabel)||meshHotspots.get(h.id?.toLowerCase());
    if(meshHS&&meshHS.position){
      // Use mesh position for this hotspot
      h.position=meshHS.position;
    }
  });

  // Add hotspots that only exist in the model (not in JSON)
  meshHotspots.forEach((v,k)=>{
    if(k.startsWith('label:'))return; // Skip duplicate label keys
    const existing=allHS.find(h=>h.label.toLowerCase()===v.label.toLowerCase()||h.id===k);
    if(!existing){
      allHS.push({id:k,label:v.label,description:'',position:v.position,color:'#3b82f6',icon:'📍',images:[],type:'amenity',meshName:v.meshName});
    }
  });

  allHS.forEach(h=>{
    const el=document.createElement('div');el.className='hs-m';
    el.innerHTML=`<div class="hs-dome" style="background:${h.color||'#3b82f6'}">${h.icon||'📍'}</div><div class="hs-lbl">${h.label}</div>`;
    el.onclick=()=>selectHS(h);box.appendChild(el);
    items.push({el,pos:new THREE.Vector3(...h.position),data:h});
  });
}
function update(){items.forEach(({el,pos})=>{
  const p=E.project(pos);
  if(!p||p.x<-40||p.x>innerWidth+40||p.y<-40||p.y>innerHeight+40){el.style.display='none';return;}
  // Occlusion test
  const occluded=E.isOccluded(pos);
  el.classList.toggle('occluded',occluded);
  el.style.display='block';el.style.left=p.x+'px';el.style.top=p.y+'px';el.style.transform='translate(-50%,-50%)';
});}
function selectHS(h){
  // Clear previous selection
  items.forEach(({el,data})=>el.classList.toggle('sel',data.id===h.id));
  U.desel();Srch.hl(null);
  
  // Find and highlight the hotspot mesh
  const bldgBBox=Mdl.bbox();
  const hp=new THREE.Vector3(...h.position);
  
  // Find mesh by label or id and highlight it
  const normHLabel=h.label.toLowerCase().replace(/[\s_\-\.]/g,'');
  const meshData=Mdl.hsMap().get(normHLabel)||Mdl.hsMap().get(h.id?.toLowerCase());
  
  if(meshData?.mesh){
    // Highlight the mesh by making it visible and pulsing
    const mesh=meshData.mesh;
    mesh.visible=true;
    mesh.material=mesh.material.clone();
    mesh.material.transparent=true;
    mesh.material.opacity=0.6;
    mesh.material.color=new THREE.Color(h.color||'#3b82f6');
    mesh.renderOrder=100;
    
    // Store original material for restoration
    if(!mesh.userData.origMaterial){
      mesh.userData.origMaterial=mesh.material.clone();
      mesh.userData.origMaterial.opacity=0;
      mesh.userData.origMaterial.visible=false;
    }
    
    // Animate pulse effect
    let phase=0;
    const pulse=()=>{
      if(mesh.userData!==h._pulseData){phase=0;return;}
      phase+=0.1;
      mesh.material.opacity=0.4+Math.sin(phase)*0.2;
      if(phase<Math.PI*2)requestAnimationFrame(pulse);
    };
    mesh.userData._pulseData=h;
    pulse();
  }
  
  E.flyTo(hp.clone().add(new THREE.Vector3(5,5,10)),hp);
  UI.expandDet();UI.showHS(h);
}
function clear(){
  items.forEach(({el})=>el.classList.remove('sel'));
  // Restore all hotspot meshes to hidden state
  Mdl.hsMap().forEach((v,k)=>{
    if(v.mesh){
      // Hide the mesh
      v.mesh.visible=false;
      // Reset material if we have stored original
      if(v.mesh.userData.origMaterial){
        v.mesh.material=v.userData.origMaterial;
      }
    }
  });
}
return{build,update,selectHS,clear};
})();

function init(){items=(TD.gallery||[]).map(g=>({url:g.url||g,type:g.type||(isV(g.url||g)?'video':'image'),label:g.label||''}));const box=document.getElementById('gal-th');box.innerHTML='';items.slice(0,3).forEach(it=>{const d=document.createElement('div');d.className='gth';if(it.url&&it.type==='image')d.innerHTML=`<img src="${it.url}" loading="lazy">`;else{d.style.cssText='background:#1a2a4a;display:flex;align-items:center;justify-content:center;font-size:14px';d.textContent=it.type==='video'?'🎬':'📷';}box.appendChild(d)});if(items.length>3){const m=document.createElement('div');m.className='gmore';m.textContent=`+${items.length-3}`;box.appendChild(m);}document.getElementById('gal-cnt').textContent=`${items.length} items`;document.getElementById('gal').onclick=()=>open(0);}
function open(i){idx=i;lbZoom=1;document.getElementById('lb').classList.add('open');refresh();}
function close(){document.getElementById('lb').classList.remove('open');if(mEl){if(mEl.tagName==='VIDEO')mEl.pause();mEl.remove();mEl=null;}if(orig){items=orig;orig=null;}}
function refresh(){if(!items.length)return;const it=items[idx];if(mEl){mEl.remove();mEl=null;}lbZoom=1;const lb=document.getElementById('lb');if(it.type==='video'&&it.url){mEl=document.createElement('video');mEl.className='lb-media';mEl.src=it.url;mEl.controls=true;mEl.autoplay=true;}else{mEl=document.createElement('img');mEl.className='lb-media';mEl.src=it.url||'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300"><rect fill="%23222" width="400" height="300"/><text x="200" y="150" fill="%23555" text-anchor="middle" font-size="14">No Image</text></svg>';}lb.insertBefore(mEl,document.getElementById('lb-dots'));document.getElementById('lb-cnt').textContent=`${idx+1}/${items.length}`;document.getElementById('lb-type').textContent=it.type==='video'?'🎬 Video':'📷 Photo';const dots=document.getElementById('lb-dots');dots.innerHTML='';for(let i=0;i<Math.min(items.length,20);i++){const d=document.createElement('button');d.className='lb-dot'+(i===idx?' on':'');d.onclick=()=>{idx=i;refresh()};dots.appendChild(d);}}
function nav(d){if(!items.length)return;idx=(idx+d+items.length)%items.length;refresh();}
function openCustom(mi,si){orig=items;items=mi;idx=si||0;document.getElementById('lb').classList.add('open');refresh();}
function lbZoomIn(){lbZoom=Math.min(lbZoom*1.3,5);applyLbTransform();}
function lbZoomOut(){lbZoom=Math.max(lbZoom/1.3,.5);applyLbTransform();}
function applyLbTransform(){if(mEl)mEl.style.transform=`scale(${lbZoom})`;}
function download(){if(mEl?.src){const a=document.createElement('a');a.href=mEl.src;a.download='image';a.click();}}
return{init,open,close,nav,openCustom,lbZoomIn,lbZoomOut,download};
})();

// ═══ PANORAMA ═══
const Pano=(()=>{
let pS,pC,pR,pCtrl,active=0;
function init2(){const cv=document.getElementById('pano-can');pR=new THREE.WebGLRenderer({canvas:cv,antialias:true});pR.setPixelRatio(Math.min(devicePixelRatio,2));pS=new THREE.Scene();pC=new THREE.PerspectiveCamera(75,1,.1,1000);pC.position.set(0,0,.1);pCtrl=new OrbitControls(pC,cv);pCtrl.enableZoom=true;pCtrl.enablePan=false;pCtrl.rotateSpeed=-.3;pCtrl.enableDamping=true;pCtrl.dampingFactor=.1;pCtrl.minDistance=.01;pCtrl.maxDistance=.5;}
function open(url,title,navHotspots){if(!pR)init2();active=1;const el=document.getElementById('pano');el.classList.add('open');document.getElementById('pano-ti').textContent=title||'Panorama';pR.setSize(el.clientWidth,el.clientHeight);pC.aspect=el.clientWidth/el.clientHeight;pC.updateProjectionMatrix();pC.position.set(0,0,.1);pCtrl.target.set(0,0,0);pC.fov=75;pC.updateProjectionMatrix();
  new THREE.TextureLoader().load(url,tex=>{tex.colorSpace=THREE.SRGBColorSpace;const geo=new THREE.SphereGeometry(50,60,40);geo.scale(-1,1,1);pS.children.forEach(c=>{pS.remove(c);c.geometry?.dispose();c.material?.dispose()});pS.add(new THREE.Mesh(geo,new THREE.MeshBasicMaterial({map:tex})))});

  const hsBox=document.getElementById('pano-hs-box');hsBox.innerHTML='';

  (function r(){if(!active)return;requestAnimationFrame(r);pCtrl.update();pR.render(pS,pC)})();
  const onR=()=>{if(!active)return;pR.setSize(el.clientWidth,el.clientHeight);pC.aspect=el.clientWidth/el.clientHeight;pC.updateProjectionMatrix()};addEventListener('resize',onR);el._onR=onR;}
function close(){active=0;document.getElementById('pano').classList.remove('open');const el=document.getElementById('pano');if(el._onR)removeEventListener('resize',el._onR);}
function zoomIn(){if(!pC)return;pC.fov=Math.max(pC.fov-10,20);pC.updateProjectionMatrix();}

})();

// ═══ 3D FLOOR PLAN ═══
const FP=(()=>{
let floor=3,fpS,fpC,fpR,fpCtrl,fpActive=0,currentUnitType=null;
function open(f,unitType){floor=f||3;currentUnitType=unitType||null;document.getElementById('fp').classList.add('open');init3D();}
function close(){document.getElementById('fp').classList.remove('open');fpActive=0;}
function setLoading(show){const el=document.getElementById('fp-loading');if(el)el.style.display=show?'flex':'none';}
function init3D(){
  setLoading(true);
  const cont=document.getElementById('fp-view');let cv=cont.querySelector('.fp3dc');
  if(!cv){cv=document.createElement('canvas');cv.className='fp3dc';cv.style.cssText='width:100%;height:100%;display:block';cont.appendChild(cv);}
  cv.style.display='block';document.getElementById('fp-can').style.display='none';
  const W=cont.clientWidth,H=cont.clientHeight;
  if(!fpR){fpR=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});fpR.shadowMap.enabled=true;fpR.toneMapping=THREE.ACESFilmicToneMapping;fpR.outputColorSpace=THREE.SRGBColorSpace;}
  fpR.setSize(W,H);fpR.setPixelRatio(Math.min(devicePixelRatio,2));
  fpS=new THREE.Scene();fpS.background=new THREE.Color(getComputedStyle(document.documentElement).getPropertyValue('--card2').trim()||'#f9fafb');
  fpC=new THREE.PerspectiveCamera(45,W/H,.1,500);fpC.position.set(25,35,50);
  fpCtrl=new OrbitControls(fpC,cv);fpCtrl.enableDamping=true;fpCtrl.dampingFactor=.08;
  fpS.add(new THREE.AmbientLight(0xffffff,.7));const sun=new THREE.DirectionalLight(0xffffff,1.2);sun.position.set(6,16,6);sun.castShadow=true;fpS.add(sun);

  // Filter units by floor and optionally by unit type
  let floorUnits=TD.units.filter(u=>u.floor===floor);
  if(currentUnitType){floorUnits=floorUnits.filter(u=>u.type===currentUnitType);}
  
  const fp3dPath=floorUnits[0]?.floorPlan3D;
  // Get unique unit types on this floor for the title
  const unitTypes=[...new Set(floorUnits.map(u=>u.type))].join(', ');

  document.getElementById('fp-fl').textContent=unitTypes||`Floor ${floor}`;
  document.getElementById('fp-uc').textContent='';

  if(fp3dPath){
    // Load actual 3D floor plan GLB
    AL.glb(fp3dPath,'Floor plan').then(gltf=>{
      const model=gltf.scene;const sc=TD.statusColors||{};
      model.traverse(child=>{if(child.isMesh){child.castShadow=true;child.receiveShadow=true;
        const norm=s=>(s||'').toLowerCase().replace(/[\s_\-\.]/g,'');
        const unit=floorUnits.find(u=>norm(child.name)===norm(u.unitNumber)||norm(child.name)===norm(u.name)||norm(child.geometry?.name||'')===norm(u.unitNumber));
        if(unit){child.material=child.material.clone();child.material.color=new THREE.Color(sc[unit.status]||'#22c55e');child.material.transparent=true;child.material.opacity=.7;}}});
      fpS.add(model);
      const box=new THREE.Box3().setFromObject(model);const center=box.getCenter(new THREE.Vector3());const size=box.getSize(new THREE.Vector3());
      const maxDim=Math.max(size.x,size.y,size.z);
      const dist=maxDim*1.8;
      fpC.position.set(center.x+dist,center.y+dist*.6,center.z+dist);fpCtrl.target.copy(center);
      setLoading(false);
    }).catch(()=>{buildProcedural(floorUnits);setLoading(false);});
  }else{buildProcedural(floorUnits);setLoading(false);}
  fpActive=1;(function r(){if(!fpActive)return;requestAnimationFrame(r);fpCtrl.update();fpR.render(fpS,fpC)})();
}

function buildProcedural(units){
  const sc=TD.statusColors||{};
  const slab=new THREE.Mesh(new THREE.BoxGeometry(20,.12,14),new THREE.MeshStandardMaterial({color:0xdddddd,roughness:.8}));slab.position.y=-.06;slab.receiveShadow=true;fpS.add(slab);
  const bbs=units.map(u=>{if(u.bbox)return{u,mnX:u.bbox.min[0],mxX:u.bbox.max[0],mnZ:u.bbox.min[2],mxZ:u.bbox.max[2]};if(u._meshBBox)return{u,mnX:u._meshBBox.min.x,mxX:u._meshBBox.max.x,mnZ:u._meshBBox.min.z,mxZ:u._meshBBox.max.z};return null}).filter(Boolean);
  if(!bbs.length)return;
  const cX=(Math.min(...bbs.map(b=>b.mnX))+Math.max(...bbs.map(b=>b.mxX)))/2;
  const cZ=(Math.min(...bbs.map(b=>b.mnZ))+Math.max(...bbs.map(b=>b.mxZ)))/2;
  bbs.forEach(({u,mnX,mxX,mnZ,mxZ})=>{
    const w=Math.abs(mxX-mnX)||3,d=Math.abs(mxZ-mnZ)||3,wH=2.6;const col=new THREE.Color(sc[u.status]||'#22c55e');
    const fl=new THREE.Mesh(new THREE.BoxGeometry(w,.02,d),new THREE.MeshStandardMaterial({color:col,transparent:true,opacity:.2}));fl.position.set((mnX+mxX)/2-cX,.01,(mnZ+mxZ)/2-cZ);fpS.add(fl);
    const wm=new THREE.MeshStandardMaterial({color:0xcccccc,transparent:true,opacity:.5});
    [{p:[(mnX+mxX)/2-cX,wH/2,mnZ-cZ],s:[w,wH,.05]},{p:[(mnX+mxX)/2-cX,wH/2,mxZ-cZ],s:[w,wH,.05]},{p:[mnX-cX,wH/2,(mnZ+mxZ)/2-cZ],s:[.05,wH,d]},{p:[mxX-cX,wH/2,(mnZ+mxZ)/2-cZ],s:[.05,wH,d]}].forEach(wl=>{const m=new THREE.Mesh(new THREE.BoxGeometry(...wl.s),wm.clone());m.position.set(...wl.p);m.castShadow=true;fpS.add(m)});
    const edge=new THREE.Mesh(new THREE.BoxGeometry(w+.06,.03,d+.06),new THREE.MeshBasicMaterial({color:col}));edge.position.set((mnX+mxX)/2-cX,wH,(mnZ+mxZ)/2-cZ);fpS.add(edge);
    // Label
    const cv2=document.createElement('canvas');cv2.width=256;cv2.height=64;const cx=cv2.getContext('2d');cx.fillStyle='rgba(0,0,0,.5)';cx.fillRect(0,0,256,64);cx.fillStyle='#fff';cx.font='bold 20px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(u.unitNumber||u.name,128,32);
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv2),transparent:true}));sp.scale.set(1.6,.4,1);sp.position.set((mnX+mxX)/2-cX,wH+.4,(mnZ+mxZ)/2-cZ);fpS.add(sp);
  });
  // Set camera to show entire building
  const maxX=Math.max(...bbs.map(b=>b.mxX));const minX=Math.min(...bbs.map(b=>b.mnX));
  const maxZ=Math.max(...bbs.map(b=>b.mxZ));const minZ=Math.min(...bbs.map(b=>b.mnZ));
  const bW=maxX-minX;const bD=maxZ-minZ;const bSize=Math.max(bW,bD);
  const dist=bSize*2.5;const ctrX=(minX+maxX)/2;const ctrZ=(minZ+maxZ)/2;
  fpC.position.set(ctrX+dist,ctrX+dist*.8,ctrZ+dist);fpCtrl.target.set(ctrX,0,ctrZ);
}
return{open,close};
})();

  const media=collectMedia(unit);const ti=TD.unitTypes?.[unit.unitType];

  // Carousel
  let car;if(media.length){const f=media[0];const tag=f.type==='video'?`<video src="${f.url}" muted autoplay loop playsinline></video>`:`<img src="${f.url}">`;car=`<div class="u-carousel" id="u-car">${tag}${media.length>1?`<button class="cb p" id="cp">◀</button><button class="cb n" id="cn">▶</button><div class="cdots">${media.map((_,i)=>`<button class="cdot${i===0?' on':''}" data-i="${i}"></button>`).join('')}</div>`:''}
  <div class="mc">${media.length>1?`1/${media.length}`:(f.type==='video'?'🎬':'📷')}</div></div>`;}else car='<div class="u-carousel" style="display:flex;align-items:center;justify-content:center;font-size:32px;color:rgba(255,255,255,.3)">🏠</div>';

  // Previews
  let previews='';const hasFP=unit.floorPlan;const hasPano=unit.panorama;
  if(hasFP||hasPano){previews='<div class="u-previews">';
    if(hasFP)previews+=`<div class="u-preview" id="pv-fp"><img src="${unit.floorPlan}"><div class="pv-label"><span class="pv-icon">📐</span>Floor Plan</div></div>`;
    if(hasPano)previews+=`<div class="u-preview pano" id="pv-pano"><img src="${unit.panorama}" style="width:100%;height:100%;object-fit:cover;"><div class="pv-label"><span class="pv-icon">🔄</span>Panorama</div></div>`;
    previews+='</div>';
  }

  // Actions
  let acts=`<button class="u-btn u-btn-p" id="uc-3d">🏗️ 3D Plan</button>`;
  if(media.length)acts+=`<button class="u-btn u-btn-s" id="uc-gal">📷 ${media.length}</button>`;

  // Area expandable
  const ab=unit.areaBreakdown;const fas=unit.functionalAreas||(ti?.functionalAreas);
  let areaSection='';
  if(ab||fas?.length){
    areaSection=`<button class="u-area-toggle" id="area-tog">📏 View Area Details <span>▼</span></button><div class="u-area-body" id="area-body">`;
    if(ab)areaSection+=`<div class="u-ab-grid"><div class="u-ab"><small>Net</small><b>${ab.net}m²</b></div><div class="u-ab"><small>Common</small><b>${ab.common}m²</b></div><div class="u-ab"><small>Total</small><b>${ab.total}m²</b></div></div>`;
    if(fas?.length)areaSection+=`<div class="fa-list">${fas.map(f=>`<div class="fa-row"><span class="fn">${f.name}</span><span class="fv">${f.area}m²</span></div>`).join('')}</div>`;
    areaSection+='</div>';
  }

  d.innerHTML=`<div class="u-card">${car}
    <div class="u-head"><span class="u-name">🏠 ${unit.name}</span><span class="badge ${bc}">${unit.status}</span></div>
    ${ti?`<div class="u-sub">${ti.label||unit.unitType}<span class="sep"></span>🛏️ ${unit.bedrooms||ti.bedrooms}<span class="sep"></span>🚿 ${unit.bathrooms||ti.bathrooms}</div>`:''}
    <div class="u-stats">
      <div class="u-st"><small>Type</small><b>${unit.type}</b></div>
      <div class="u-st"><small>Floor</small><b>${unit.floor}</b></div>
      <div class="u-st"><small>Area</small><b>${ab?.total||unit.area}m²</b></div>
      <div class="u-st"><small>Price</small><b class="pr">${unit.priceFormatted||'TBD'}</b></div>
    </div>
    <div class="u-desc">${unit.description||''}</div>
    ${unit.features?.length?`<div class="u-feats">${unit.features.map(f=>`<span class="u-feat">${f}</span>`).join('')}</div>`:''}
    ${areaSection}${previews}
    <div class="u-actions">${acts}</div>
  </div>`;

  // Wire carousel
  if(media.length>1){let ci=0;const upC=()=>{const car2=document.getElementById('u-car');if(!car2)return;const m=media[ci];const old=car2.querySelector('img,video');let ne;if(m.type==='video'){ne=document.createElement('video');ne.src=m.url;ne.muted=true;ne.autoplay=true;ne.loop=true;ne.playsInline=true;}else{ne=document.createElement('img');ne.src=m.url;}if(old)old.replaceWith(ne);car2.querySelector('.mc').textContent=`${ci+1}/${media.length}`;car2.querySelectorAll('.cdot').forEach((dot,i)=>dot.classList.toggle('on',i===ci));};
  d.querySelector('#cp')?.addEventListener('click',()=>{ci=(ci-1+media.length)%media.length;upC()});d.querySelector('#cn')?.addEventListener('click',()=>{ci=(ci+1)%media.length;upC()});d.querySelectorAll('.cdot').forEach(dot=>dot.addEventListener('click',()=>{ci=+dot.dataset.i;upC()}));}

  // Wire area toggle
  d.querySelector('#area-tog')?.addEventListener('click',()=>{const body=document.getElementById('area-body');body.classList.toggle('open');d.querySelector('#area-tog span').textContent=body.classList.contains('open')?'▲':'▼';});

  // Wire previews
  d.querySelector('#pv-fp')?.addEventListener('click',()=>{document.getElementById('fp2d-img').src=unit.floorPlan;document.getElementById('fp2d-img').style.transform='';document.getElementById('fp2d').classList.add('open');});
  d.querySelector('#pv-pano')?.addEventListener('click',()=>Pano.open(unit.panorama,unit.name,unit.panoNavHotspots));
  d.querySelector('#uc-3d')?.addEventListener('click',()=>FP.open(unit.floor,unit.type));
  d.querySelector('#uc-gal')?.addEventListener('click',()=>Gal.openCustom(media,0));
}

function collectMedia(u){const m=[];const isV=url=>url&&/\.(mp4|webm|mov|ogg)(\?|$)/i.test(url);
  if(u.image&&!m.find(x=>x.url===u.image))m.push({url:u.image,type:isV(u.image)?'video':'image',label:u.name});
  if(u.images)u.images.forEach((img,i)=>{const url=typeof img==='string'?img:img.url;if(url&&!m.find(x=>x.url===url))m.push({url,type:isV(url)?'video':'image',label:`${u.name} ${i+1}`});});
  if(u.videos)u.videos.forEach(v=>{const url=typeof v==='string'?v:v.url;if(url)m.push({url,type:'video',label:'Video'});});
  return m;}

function showHS(h){
  document.getElementById('d-def').style.display='none';const d=document.getElementById('d-dyn');
  const media=[];
  if(h.images)h.images.forEach(img=>{const url=typeof img==='string'?img:img.url;if(url)media.push({url,type:'image',label:h.label})});
  if(h.videos)h.videos.forEach(v=>{const url=typeof v==='string'?v:v.url;if(url)media.push({url,type:'video',label:h.label})});

  // Carousel for hotspot images/videos
  let car='';
  if(media.length){
    const f=media[0];const tag=f.type==='video'?`<video src="${f.url}" muted autoplay loop playsinline class="active"></video>`:`<img src="${f.url}" class="active">`;
    car=`<div class="u-carousel" id="hs-car">${tag}${media.length>1?`<button class="cb p" id="hs-cp">◀</button><button class="cb n" id="hs-cn">▶</button><div class="cdots">${media.map((_,i)=>`<button class="cdot${i===0?' on':''}" data-i="${i}"></button>`).join('')}</div>`:''}
    <div class="mc">${media.length>1?`1/${media.length}`:(f.type==='video'?'🎬':'')}</div></div>`;
  }

  d.innerHTML=`<div class="hs-card">${car}
    <div class="hs-head"><div class="hs-ic" style="background:${h.color||'#3b82f6'}">${h.icon||'📍'}</div><span class="hs-ti">${h.label}</span></div>
    <div class="u-desc">${h.description||''}</div>
    ${media.length>1?`<button class="u-btn u-btn-s" style="width:100%;margin-top:4px" id="hs-gal">📷 View All (${media.length})</button>`:''}
  </div>`;

  // Wire carousel
  if(media.length>1){
    let ci=0;
    const upC=()=>{
      const car2=document.getElementById('hs-car');
      if(!car2)return;
      const m=media[ci];
      const oldTag=car2.querySelector('img,video');
      let ne;if(m.type==='video'){ne=document.createElement('video');ne.src=m.url;ne.muted=true;ne.autoplay=true;ne.loop=true;ne.playsInline=true;ne.className='active';}else{ne=document.createElement('img');ne.src=m.url;ne.className='active';}
      if(oldTag)oldTag.replaceWith(ne);
      car2.querySelector('.mc').textContent=`${ci+1}/${media.length}`;
      car2.querySelectorAll('.cdot').forEach((dot,i)=>dot.classList.toggle('on',i===ci));
    };
    d.querySelector('#hs-cp')?.addEventListener('click',()=>{ci=(ci-1+media.length)%media.length;upC()});
    d.querySelector('#hs-cn')?.addEventListener('click',()=>{ci=(ci+1)%media.length;upC()});
    d.querySelectorAll('.cdot').forEach(dot=>dot.addEventListener('click',()=>{ci=+dot.dataset.i;upC()}));
  }

  d.querySelector('#hs-gal')?.addEventListener('click',()=>Gal.openCustom(media,0));
}

function resetDet(){document.getElementById('d-def').style.display='';document.getElementById('d-dyn').innerHTML='';}

return{init,expandDet,showUnit,showHS,resetDet,populateProject,populateIntro};
})();

// ═══ BOOT ═══
async function boot(){
  E.init();
  try{TD=await AL.json(CFG.dataPath)}catch(e){console.warn('No tour-data.json');TD={projectName:'Demo',units:[],hotspots:[],gallery:[]};}
  TD.units=TD.units||[];TD.hotspots=TD.hotspots||[];TD.gallery=TD.gallery||[];
  TD.units.forEach(u=>{u.id=u.id||u.unitNumber||u.name;u.description=u.description||u.desc||'';u.features=u.features||[];});

  UI.populateIntro();
  E.configure(TD);

  if(TD.hdri){try{E.setEnv(await AL.hdri(TD.hdri))}catch(e){E.setFallbackBg()}}else E.setFallbackBg();
  if(TD.modelFile){try{Mdl.load(await AL.glb(TD.modelFile,'Building'))}catch(e){Mdl.fallback()}}else Mdl.fallback();

  const urls=new Set();TD.gallery.forEach(g=>{if(g.url)urls.add(g.url)});TD.units.slice(0,16).forEach(u=>{if(u.image)urls.add(u.image)});
  if(TD.media?.heroImage)urls.add(TD.media.heroImage);
  if(urls.size)await AL.imgs([...urls].slice(0,15));

  U.build();HS.build();Srch.init();Gal.init();UI.init();UI.populateProject();
  AL.done();

  document.getElementById('intro-enter').onclick=()=>document.getElementById('intro').classList.add('gone');
  document.getElementById('c').addEventListener('click',U.onClick);

  // PWA service worker
  if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}

  let frame=0;(function loop(){requestAnimationFrame(loop);frame++;E.render();if(frame%2===0)HS.update()})();
}

boot();
</script>
